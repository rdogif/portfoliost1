<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rishaan's Slicing Test - Physics Overhaul</title>
<style>
  :root {
    --panel: #fff;
    --panel-dark: #000;
    --ink: #000;
    --accent: #000;
    --accent-dark: #000;
    --line: #aaa397;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #fff;
    font-family: "Trebuchet MS", Arial, sans-serif;
    color: var(--ink);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: crosshair;
  }

  #toolbar {
    position: fixed;
    left: 14px;
    top: 14px;
    width: 230px;
    background: var(--panel);
    border: 1px solid var(--panel-dark);
    padding: 10px;
    user-select: none;
  }

  h1 {
    margin: 0 0 3px;
    font-family: Arial, sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0;
  }

  .subtitle {
    font-size: 10px;
    color: #555;
    border-bottom: 1px solid #000;
    padding-bottom: 7px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .mode-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }

  button, select {
    font: inherit;
    font-size: 12px;
    border: 1px solid #000;
    background: #fff;
    color: #000;
    padding: 7px 8px;
    cursor: pointer;
    border-radius: 0;
  }

  button:hover, select:hover { background: #eee; }

  button.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent-dark);
  }

  button:active { transform: translate(1px, 1px); }

  select { width: 100%; margin-top: 7px; }

  label {
    display: flex;
    justify-content: space-between;
    margin-top: 9px;
    font-size: 11px;
    color: #45413b;
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
  }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 9px;
  }

  .wide { grid-column: span 2; }

  #stats {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--line);
    font-family: Consolas, monospace;
    font-size: 11px;
  }

  #help {
    position: fixed;
    bottom: 12px;
    right: 14px;
    max-width: 310px;
    color: rgba(255,255,255,.9);
    font-size: 12px;
    text-shadow: 0 1px 2px rgba(0,0,0,.8);
    text-align: right;
    pointer-events: none;
    transition: opacity .8s ease;
  }

  #help.hidden {
    opacity: 0;
  }

  .spawn-browser {
    margin-top: 8px;
    border: 1px solid #111;
    background: #fff;
  }

  .spawn-browser input {
    width: 100%;
    border: 0;
    border-bottom: 1px solid #111;
    padding: 7px 8px;
    font: inherit;
    font-size: 12px;
    outline: none;
    background: #fff;
    color: #000;
  }

  .spawn-option:last-child {
    border-bottom: 0;
  }


  #spawnPanel {
    position: fixed;
    top: 14px;
    left: calc(100vw - 334px);
    right: auto;
    width: 320px;
    height: 560px;
    min-width: 240px;
    min-height: 300px;
    max-width: calc(100vw - 28px);
    max-height: calc(100vh - 28px);
    display: none;
    flex-direction: column;
    background: #fff;
    border: 1px solid #000;
    resize: both;
    bottom: auto;
    overflow: hidden;
    z-index: 20;
  }

  #spawnPanel.visible {
    display: flex;
  }

  #spawnPanelHeader {
    flex: 0 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 8px;
    background: #000;
    color: #fff;
    cursor: move;
    font-family: Consolas, monospace;
    font-size: 12px;
    user-select: none;
  }

  #spawnPanelHeader span:last-child {
    opacity: .65;
    font-size: 10px;
  }

  #spawnPanelBody {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  #spawnSearch {
    flex: 0 0 auto;
    width: calc(100% - 16px);
    margin: 8px;
    border: 1px solid #000;
    padding: 7px 8px;
    font: inherit;
    font-size: 12px;
    outline: none;
    background: #fff;
    color: #000;
  }


  #categoryFilters {
    flex: 0 0 auto;
    display: flex;
    gap: 5px;
    padding: 0 8px 8px;
    overflow-x: auto;
    scrollbar-width: thin;
  }

  .category-filter {
    flex: 0 0 auto;
    padding: 4px 7px;
    border: 1px solid #000;
    background: #fff;
    color: #000;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .35px;
  }

  .category-filter.active {
    background: #000;
    color: #fff;
  }

  #spawnSettings {
    flex: 0 0 auto;
    padding: 0 8px 8px;
    border-bottom: 1px solid #000;
  }

  #spawnSettings label {
    margin-top: 0;
  }

  #spawnSettings input[type="range"] {
    display: block;
    width: 100%;
  }

  .spawn-size-note {
    margin-top: 2px;
    font-family: Consolas, monospace;
    font-size: 9px;
    opacity: .55;
  }

  #spawnOptions {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
    align-content: start;
    gap: 6px;
    padding: 8px;
    overflow-y: auto;
  }

  .spawn-option {
    height: 134px;
    min-height: 134px;
    display: grid;
    grid-template-rows: 68px minmax(2.5em, auto) auto;
    align-content: start;
    gap: 6px;
    border: 1px solid #000;
    padding: 5px;
    background: #fff;
    color: #000;
    text-align: left;
    font-size: 11px;
    overflow: hidden;
  }

  .spawn-option:hover {
    background: #eee;
  }

  .spawn-option.selected {
    background: #000;
    color: #fff;
  }

  .spawn-option:active {
    transform: none;
  }

  .spawn-preview {
    width: 100%;
    height: 68px;
    display: block;
    background: #f7f7f7;
    border: 1px solid currentColor;
  }

  .spawn-option-name {
    display: block;
    min-height: 2.5em;
    line-height: 1.25;
    white-space: normal;
    overflow-wrap: anywhere;
    color: inherit;
    font-weight: 600;
    position: relative;
    z-index: 1;
  }

  .spawn-option small {
    opacity: .6;
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: .35px;
  }

  #selectedSpawn {
    flex: 0 0 auto;
    padding: 7px 9px;
    white-space: normal;
    overflow-wrap: anywhere;
    border-top: 1px solid #000;
    background: #fff;
    font-family: Consolas, monospace;
    font-size: 10px;
  }

  @media (max-width: 600px) {
    #toolbar { width: 205px; transform: scale(.9); transform-origin: top left; }
    #help { display: none; }
  }
</style>
</head>
<body>
<canvas id="world"></canvas>


<section id="toolbar">
  <h1>Rishaan's Slicing Test</h1>
  <div class="subtitle">little physics sandbox</div>

  <div class="mode-grid">
    <button data-mode="slice" class="active">Slice</button>
    <button data-mode="drag">Grab</button>
    <button data-mode="spawn">Spawn</button>
    <button data-mode="delete">Delete</button>
  </div>

  <div class="actions">
    <button id="spawnTen">drop 10</button>
    <button id="reset">reset</button>
    <button id="pause" type="button" aria-pressed="false">Pause</button>
    <button id="slow" type="button" aria-pressed="false" title="S">slow motion</button>
    <button id="impact" class="wide" type="button" aria-pressed="false" title="I">Impact: off</button>
  </div>
</section>




<section id="spawnPanel">
  <div id="spawnPanelHeader">
    <span>SPAWNABLES</span>
    <span>drag</span>
  </div>

  <div id="spawnPanelBody">
    <input id="spawnSearch" type="text" placeholder="search...">

    <div id="categoryFilters" aria-label="Spawnable categories"></div>

    <div id="spawnSettings">
      <label><span>spawn size</span><span id="sizeValue">Random</span></label>
      <input id="sizeSlider" type="range" min="0" max="120" value="0">
      <div class="spawn-size-note">0 = random size</div>
    </div>

    <div id="spawnOptions"></div>
  </div>

  <div id="selectedSpawn">selected: random shape</div>
</section>


<div id="help">
  drag to slice · grab and throw · right-click to spawn · Space pause · S slow · I impact · R reset
</div>

<script>
(() => {
  const canvas = document.getElementById("world");
  const ctx = canvas.getContext("2d");

  const ui = {
    spawnPanel: document.getElementById("spawnPanel"),
    spawnPanelHeader: document.getElementById("spawnPanelHeader"),
    spawnSearch: document.getElementById("spawnSearch"),
    categoryFilters: document.getElementById("categoryFilters"),
    spawnOptions: document.getElementById("spawnOptions"),
    selectedSpawn: document.getElementById("selectedSpawn"),
    sizeSlider: document.getElementById("sizeSlider"),
    sizeValue: document.getElementById("sizeValue"),
    pause: document.getElementById("pause"),
    slow: document.getElementById("slow"),
    impact: document.getElementById("impact"),
    help: document.getElementById("help")
  };

  ui.help.textContent = "drag to slice \u00b7 grab and throw \u00b7 right-click to spawn \u00b7 Space pause \u00b7 S slow \u00b7 I impact \u00b7 R reset";

  let width = 0;
  let height = 0;
  let pixelRatio = 1;
  let bodies = [];
  let mode = "slice";
  let selectedSpawnType = "random";
  let selectedSpawnCategory = "all";
  let paused = false;
  let slowMotion = false;
  let impactMode = false;
  let cuts = 0;
  let idCounter = 1;
  let sliceStart = null;
  let heldBody = null;
  let heldLocalPoint = null;
  let drawSpawnStart = null;
  let weldDraftParts = [];
  let weldDraftColor = null;
  let mouseTrail = [];
  let wind = 0;
  let flash = 0;
  let previousTime = performance.now();
  let helpRemaining = 5;
  const impactBreakQueue = new Map();

  const pointer = { x: 0, y: 0, down: false };

  const palette = [
    "#c75c4a", "#d99a3d", "#d6bd55", "#5c9b77",
    "#4f83a3", "#7868a6", "#9e5f77", "#81745c"
  ];

  const add = (a,b) => ({ x: a.x+b.x, y: a.y+b.y });
  const sub = (a,b) => ({ x: a.x-b.x, y: a.y-b.y });
  const mul = (a,s) => ({ x: a.x*s, y: a.y*s });
  const dot = (a,b) => a.x*b.x + a.y*b.y;
  const cross = (a,b) => a.x*b.y - a.y*b.x;
  const length = a => Math.hypot(a.x,a.y);
  const normalize = a => {
    const l = length(a);
    return l > 1e-8 ? { x:a.x/l, y:a.y/l } : { x:0, y:0 };
  };
  const perpendicular = a => ({ x:-a.y, y:a.x });
  const rotate = (p,a) => ({
    x: p.x*Math.cos(a)-p.y*Math.sin(a),
    y: p.x*Math.sin(a)+p.y*Math.cos(a)
  });
  const clamp = (v,a,b) => Math.max(a,Math.min(b,v));

  function resize() {
    pixelRatio = Math.min(devicePixelRatio || 1, 2);
    width = innerWidth;
    height = innerHeight;
    canvas.width = width * pixelRatio;
    canvas.height = height * pixelRatio;
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";
    ctx.setTransform(pixelRatio,0,0,pixelRatio,0,0);
  }

  function polygonArea(vertices) {
    let sum = 0;
    for (let i=0;i<vertices.length;i++) {
      sum += cross(vertices[i], vertices[(i+1)%vertices.length]);
    }
    return sum * .5;
  }

  function centroid(vertices) {
    let areaSum = 0;
    let x = 0;
    let y = 0;

    for (let i=0;i<vertices.length;i++) {
      const a = vertices[i];
      const b = vertices[(i+1)%vertices.length];
      const c = cross(a,b);
      areaSum += c;
      x += (a.x+b.x)*c;
      y += (a.y+b.y)*c;
    }

    if (Math.abs(areaSum) < 1e-7) {
      const average = vertices.reduce((s,p)=>add(s,p), {x:0,y:0});
      return mul(average,1/vertices.length);
    }

    return { x:x/(3*areaSum), y:y/(3*areaSum) };
  }

  function makeCCW(vertices) {
    return polygonArea(vertices) < 0 ? [...vertices].reverse() : vertices;
  }

  function pointInTriangle(p,a,b,c) {
    const ab = cross(sub(b,a),sub(p,a));
    const bc = cross(sub(c,b),sub(p,b));
    const ca = cross(sub(a,c),sub(p,c));
    const hasNegative = ab < -1e-7 || bc < -1e-7 || ca < -1e-7;
    const hasPositive = ab > 1e-7 || bc > 1e-7 || ca > 1e-7;
    return !(hasNegative && hasPositive);
  }

  function triangulate(vertices) {
    const polygon = makeCCW(vertices.map(p=>({...p})));
    if (polygon.length === 3) return [polygon];

    const indices = polygon.map((_,i)=>i);
    const triangles = [];
    let guard = 0;

    while (indices.length > 3 && guard++ < 500) {
      let clipped = false;

      for (let i=0;i<indices.length;i++) {
        const previousIndex = indices[(i-1+indices.length)%indices.length];
        const currentIndex = indices[i];
        const nextIndex = indices[(i+1)%indices.length];

        const a = polygon[previousIndex];
        const b = polygon[currentIndex];
        const c = polygon[nextIndex];

        if (cross(sub(b,a),sub(c,b)) <= 1e-7) continue;

        let containsPoint = false;
        for (const testIndex of indices) {
          if (testIndex===previousIndex || testIndex===currentIndex || testIndex===nextIndex) continue;
          if (pointInTriangle(polygon[testIndex],a,b,c)) {
            containsPoint = true;
            break;
          }
        }

        if (!containsPoint) {
          triangles.push([a,b,c]);
          indices.splice(i,1);
          clipped = true;
          break;
        }
      }

      if (!clipped) break;
    }

    if (indices.length === 3) {
      triangles.push(indices.map(index=>polygon[index]));
    }

    return triangles.length ? triangles : [polygon];
  }

  function isConvexPolygon(vertices) {
    let direction=0;
    for (let i=0;i<vertices.length;i++) {
      const turn=cross(
        sub(vertices[(i+1)%vertices.length],vertices[i]),
        sub(vertices[(i+2)%vertices.length],vertices[(i+1)%vertices.length])
      );
      if (Math.abs(turn)<1e-7) continue;
      const sign=Math.sign(turn);
      if (direction && sign!==direction) return false;
      direction=sign;
    }
    return true;
  }

  function collisionParts(vertices) {
    const polygon=makeCCW(vertices.map(point=>({...point})));
    return isConvexPolygon(polygon) ? [polygon] : triangulate(polygon);
  }

  function polygonPolarMoment(vertices) {
    let moment=0;
    for (let i=0;i<vertices.length;i++) {
      const a=vertices[i];
      const b=vertices[(i+1)%vertices.length];
      const areaCross=cross(a,b);
      moment+=areaCross*(dot(a,a)+dot(a,b)+dot(b,b));
    }
    return Math.abs(moment)/12;
  }

  function polygonMinimumThickness(vertices) {
    let minimum=Infinity;
    for (let i=0;i<vertices.length;i++) {
      const edge=sub(vertices[(i+1)%vertices.length],vertices[i]);
      if (length(edge)<1e-7) continue;
      const projection=project(vertices,normalize(perpendicular(edge)));
      minimum=Math.min(minimum,projection.max-projection.min);
    }
    return Number.isFinite(minimum) ? Math.max(2,minimum) : 12;
  }

  const MATERIAL_PRESETS = {
    neutral: {density:1, restitution:.10, staticFriction:.62, dynamicFriction:.46, airDrag:.08, angularDrag:.07, gravityScale:1, floorDrag:1, sleepDelay:.42, impactStrength:720, shatterCount:2},
    metal:   {density:2.25, restitution:.055, staticFriction:.56, dynamicFriction:.40, airDrag:.045, angularDrag:.045, gravityScale:1, floorDrag:.9, sleepDelay:.34, impactStrength:1150, shatterCount:1},
    stone:   {density:1.65, restitution:.075, staticFriction:.72, dynamicFriction:.54, airDrag:.055, angularDrag:.06, gravityScale:1, floorDrag:1.15, sleepDelay:.34, impactStrength:820, shatterCount:3},
    wood:    {density:.82, restitution:.13, staticFriction:.68, dynamicFriction:.50, airDrag:.10, angularDrag:.09, gravityScale:1, floorDrag:1.05, sleepDelay:.40, impactStrength:650, shatterCount:2},
    soft:    {density:.72, restitution:.055, staticFriction:.86, dynamicFriction:.68, airDrag:.16, angularDrag:.15, gravityScale:1, floorDrag:1.3, sleepDelay:.30, impactStrength:1000, shatterCount:1},
    rubber:  {density:.92, restitution:.48, staticFriction:.92, dynamicFriction:.72, airDrag:.10, angularDrag:.12, gravityScale:1, floorDrag:1.35, sleepDelay:.52, impactStrength:1500, shatterCount:1},
    ceramic: {density:1.25, restitution:.10, staticFriction:.66, dynamicFriction:.48, airDrag:.07, angularDrag:.07, gravityScale:1, floorDrag:1, sleepDelay:.38, impactStrength:500, shatterCount:5},
    glass:   {density:1.18, restitution:.16, staticFriction:.42, dynamicFriction:.30, airDrag:.065, angularDrag:.055, gravityScale:1, floorDrag:.8, sleepDelay:.44, impactStrength:390, shatterCount:6},
    light:   {density:.48, restitution:.08, staticFriction:.58, dynamicFriction:.42, airDrag:.28, angularDrag:.24, gravityScale:.92, floorDrag:1.05, sleepDelay:.48, impactStrength:560, shatterCount:3}
  };

  const MATERIAL_BY_TYPE = {};
  function assignMaterial(types,preset,overrides={}) {
    for (const type of types.split(" ")) {
      MATERIAL_BY_TYPE[type] = {...MATERIAL_PRESETS[preset],...overrides};
    }
  }

  assignMaterial("box rectangle line compound triangle pentagon hexagon octagon cross arrow star heart crown house tree cactus bone tungtung", "wood");
  assignMaterial("sword axe hammer anvil anchor tank knight robot trophy key magnet", "metal");
  assignMaterial("shield creeper zombie skeleton enderman skull moon sun planet gem diamond", "stone");
  assignMaterial("phone camera flask hourglass submarine ufo rocket plane", "glass", {density:1.35,restitution:.11});
  assignMaterial("human amongus astronaut ninja ghost snowman alien toilet", "soft");
  assignMaterial("duck fish cat bat capybara doge cheems shrekhead tralalero bombardino", "soft", {density:.78,airDrag:.18});
  assignMaterial("controller boot donut ball circle", "rubber");
  assignMaterial("pizza mushroom cup flower cloud banana lightning", "light");

  Object.assign(MATERIAL_BY_TYPE, {
    circle:{...MATERIAL_PRESETS.rubber,density:1.05,restitution:.56,dynamicFriction:.58},
    donut:{...MATERIAL_PRESETS.soft,density:.62,restitution:.16,dynamicFriction:.64},
    cloud:{...MATERIAL_PRESETS.light,density:.28,airDrag:.48,angularDrag:.40,gravityScale:.68},
    plane:{...MATERIAL_PRESETS.light,density:.72,airDrag:.20,angularDrag:.16,gravityScale:.90},
    rocket:{...MATERIAL_PRESETS.metal,density:1.45,airDrag:.07},
    submarine:{...MATERIAL_PRESETS.metal,density:1.75,airDrag:.09},
    pizza:{...MATERIAL_PRESETS.soft,density:.58,restitution:.04,dynamicFriction:.74},
    banana:{...MATERIAL_PRESETS.soft,density:.55,restitution:.08,dynamicFriction:.70},
    flower:{...MATERIAL_PRESETS.light,density:.38,airDrag:.34,angularDrag:.30},
    lightning:{...MATERIAL_PRESETS.metal,density:.92,restitution:.10,airDrag:.13},
    snowman:{...MATERIAL_PRESETS.soft,density:.88,restitution:.04,dynamicFriction:.58},
    toilet:{...MATERIAL_PRESETS.ceramic,density:1.3,restitution:.08},
    house:{...MATERIAL_PRESETS.wood,density:1.1,restitution:.07},
    tree:{...MATERIAL_PRESETS.wood,density:.95,restitution:.08},
    hourglass:{...MATERIAL_PRESETS.glass,density:1.05,restitution:.12},
    shield:{...MATERIAL_PRESETS.metal,density:1.75,restitution:.08},
    bone:{...MATERIAL_PRESETS.ceramic,density:1.05,restitution:.14},
    skull:{...MATERIAL_PRESETS.ceramic,density:1.0,restitution:.13},
    moon:{...MATERIAL_PRESETS.stone,density:1.42},
    planet:{...MATERIAL_PRESETS.stone,density:1.6,restitution:.12},
    sun:{...MATERIAL_PRESETS.stone,density:1.25,restitution:.14},
    gem:{...MATERIAL_PRESETS.glass,density:1.55,restitution:.20},
    diamond:{...MATERIAL_PRESETS.glass,density:1.72,restitution:.18}
  });

  Object.assign(MATERIAL_BY_TYPE, {
    materialglass:{...MATERIAL_PRESETS.glass,impactStrength:340,shatterCount:7},
    materialceramic:{...MATERIAL_PRESETS.ceramic,impactStrength:450,shatterCount:6},
    materialwood:{...MATERIAL_PRESETS.wood,impactStrength:680,shatterCount:3},
    materialstone:{...MATERIAL_PRESETS.stone,impactStrength:860,shatterCount:4},
    materialmetal:{...MATERIAL_PRESETS.metal,impactStrength:1250,shatterCount:1},
    materialrubber:{...MATERIAL_PRESETS.rubber,restitution:.62,impactStrength:1650,shatterCount:1},
    materialice:{...MATERIAL_PRESETS.glass,density:.92,restitution:.08,staticFriction:.10,dynamicFriction:.055,floorDrag:.32,impactStrength:300,shatterCount:7},
    materialfoam:{...MATERIAL_PRESETS.light,density:.22,restitution:.03,staticFriction:.82,dynamicFriction:.68,airDrag:.62,angularDrag:.52,gravityScale:.82,impactStrength:1800,shatterCount:1}
  });

  const MATERIAL_SAMPLE_TYPES = new Set([
    "materialglass","materialceramic","materialwood","materialstone",
    "materialmetal","materialrubber","materialice","materialfoam"
  ]);

  const MATERIAL_SAMPLE_COLORS = {
    materialglass:"rgba(137,211,230,.58)",
    materialceramic:"#eee8dc",
    materialwood:"#b8783d",
    materialstone:"#777b80",
    materialmetal:"#929ba5",
    materialrubber:"#c94d55",
    materialice:"rgba(170,225,248,.72)",
    materialfoam:"#e8cf65"
  };

  const materialFor = type => ({...(MATERIAL_BY_TYPE[type] || MATERIAL_PRESETS.neutral)});

  function bodyFromWorldVertices(vertices, options={}) {
    const world = makeCCW(vertices);
    const center = centroid(world);
    const local = world.map(p=>sub(p,center));
    const area = Math.max(12,Math.abs(polygonArea(world)));
    const material = options.material ? {...options.material} : materialFor(options.shapeType);
    const mass = Math.max(.025,area / 2300 * material.density);
    const radius = Math.max(...local.map(length));
    const parts = collisionParts(local);

    // Exact polygon polar moment keeps long bars, squares and tiny fragments
    // rotating according to their true mass distribution.
    const inertia = Math.max(.05,mass*polygonPolarMoment(local)/area);

    return {
      id: idCounter++,
      pos: center,
      vel: options.vel ? {...options.vel} : {x:0,y:0},
      angle: options.angle || 0,
      angVel: options.angVel || 0,
      verts: local,
      parts,
      color: options.color || palette[Math.floor(Math.random()*palette.length)],
      shapeType: options.shapeType || null,
      material,
      mass,
      invMass: 1/mass,
      inertia,
      invInertia: 1/inertia,
      radius,
      collisionThickness:polygonMinimumThickness(local),
      sleepTimer: 0,
      sleeping: false,
      releaseGrace: 0,
      impactGrace: options.impactGrace || 0,
      impactGeneration: options.impactGeneration || 0
    };
  }

  function convexHull(points) {
    const sorted = points.map(p=>({...p})).sort((a,b)=>a.x-b.x || a.y-b.y);
    if (sorted.length<=3) return makeCCW(sorted);
    const half = [];
    for (const point of sorted) {
      while (half.length>=2 && cross(sub(half[half.length-1],half[half.length-2]),sub(point,half[half.length-1]))<=0) half.pop();
      half.push(point);
    }
    const lower = half.slice(0,-1);
    half.length = 0;
    for (let i=sorted.length-1;i>=0;i--) {
      const point=sorted[i];
      while (half.length>=2 && cross(sub(half[half.length-1],half[half.length-2]),sub(point,half[half.length-1]))<=0) half.pop();
      half.push(point);
    }
    return makeCCW(lower.concat(half.slice(0,-1)));
  }

  function bodyFromCompoundPolygons(polygons,options={}) {
    const valid = polygons.filter(poly=>poly.length>=3 && Math.abs(polygonArea(poly))>1);
    if (!valid.length) return null;

    let totalArea=0;
    let weightedCenter={x:0,y:0};
    for (const poly of valid) {
      const area=Math.abs(polygonArea(poly));
      totalArea+=area;
      weightedCenter=add(weightedCenter,mul(centroid(poly),area));
    }
    const center=mul(weightedCenter,1/totalArea);
    const localPolygons=valid.map(poly=>makeCCW(poly).map(point=>sub(point,center)));
    const allLocal=localPolygons.flat();
    const hull=convexHull(allLocal);
    const material=options.material ? {...options.material} : materialFor("compound");
    const mass=Math.max(.025,totalArea/2300*material.density);
    const radius=Math.max(...allLocal.map(length));
    const polarMoment=localPolygons.reduce((sum,poly)=>sum+polygonPolarMoment(poly),0);
    const inertia=Math.max(.05,mass*polarMoment/totalArea);

    return {
      id:idCounter++,
      pos:center,
      vel:options.vel ? {...options.vel} : {x:0,y:0},
      angle:0,
      angVel:options.angVel || 0,
      verts:hull,
      polygons:localPolygons,
      parts:localPolygons.flatMap(poly=>collisionParts(poly)),
      color:options.color || palette[Math.floor(Math.random()*palette.length)],
      shapeType:"compound",
      isCompound:true,
      material,
      mass,
      invMass:1/mass,
      inertia,
      invInertia:1/inertia,
      radius,
      collisionThickness:polygonMinimumThickness(hull),
      sleepTimer:0,
      sleeping:false,
      releaseGrace:0,
      impactGrace:options.impactGrace || 0,
      impactGeneration:options.impactGeneration || 0
    };
  }

  function getWorldVertices(body) {
    return body.verts.map(p=>add(body.pos,rotate(p,body.angle)));
  }

  function getWorldParts(body) {
    return body.parts.map(part =>
      part.map(point=>add(body.pos,rotate(point,body.angle)))
    );
  }

  function getWorldDrawPolygons(body) {
    const polygons=body.polygons || [body.verts];
    return polygons.map(poly=>poly.map(point=>add(body.pos,rotate(point,body.angle))));
  }

    const points = [];
    for (let i=0;i<sides;i++) {

      points.push({x:x+Math.cos(a)*r,y:y+Math.sin(a)*r});

    return points;

        {x:x-r*.36,y:y+r*.98},{x:x-r*.46,y:y+r*.6},

        {x:x-r*.42,y:y-r*.82},{x:x-r*.2,y:y-r*.92},
        {x:x+r*.2,y:y-r*.92},{x:x+r*.42,y:y-r*.82},
        {x:x+r*.68,y:y-r},{x:x+r*.96,y:y-r*.9},

        {x:x-r*.78,y:y+r*.22},{x:x-r*.72,y:y-r*.28}
      ];
    } else if (type==="banana") {
      vertices=[
        {x:x-r*.92,y:y+r*.04},{x:x-r*.55,y:y-r*.42},

        {x:x+r*.88,y:y-r*.25},{x:x+r*.68,y:y+r*.02},
        {x:x+r*.18,y:y+r*.46},{x:x-r*.42,y:y+r*.58},
        {x:x-r*.82,y:y+r*.38}

    } else if (type==="toilet") {
      // Toilet base with a head rising from the bowl.
      vertices=[
        {x:x-r*.32,y:y-r},{x:x+r*.18,y:y-r},
        {x:x+r*.38,y:y-r*.72},{x:x+r*.38,y:y-r*.32},
        {x:x+r*.78,y:y-r*.32},{x:x+r*.92,y:y-r*.05},
        {x:x+r*.82,y:y+r*.22},{x:x+r*.42,y:y+r*.34},
        {x:x+r*.32,y:y+r*.78},{x:x+r*.58,y:y+r},
        {x:x-r*.5,y:y+r},{x:x-r*.62,y:y+r*.68},
        {x:x-r*.42,y:y+r*.38},{x:x-r*.78,y:y+r*.18},
        {x:x-r*.84,y:y-r*.18},{x:x-r*.6,y:y-r*.38},

    } else if (type === "box") {
      const w = r*(1.15+Math.random()*.65);
      const h = r*(.85+Math.random()*.6);
      vertices = [
        {x:x-w/2,y:y-h/2},{x:x+w/2,y:y-h/2},
        {x:x+w/2,y:y+h/2},{x:x-w/2,y:y+h/2}

    } else {
      const sides = {
        triangle:3,
        pentagon:5,
        hexagon:6,
        octagon:8
      }[type];
      vertices = regularPolygon(x,y,r,sides);
    }

    const memeColors = {
      tungtung:"#9a5a2c",
      tralalero:"#3c91d6",
      bombardino:"#718a45",
      capybara:"#9a7047",
      doge:"#d6a85f",
      cheems:"#c98f4d",
      shrekhead:"#78a84f",
      toilet:"#e7e7e7",
      banana:"#e4bd32",
      creeper:"#58a83f",
      zombie:"#68a84f",
      skeleton:"#dedede",
      enderman:"#1d1a24",
      astronaut:"#e7e7e7",
      ninja:"#24242a",
      knight:"#9aa0a8"
    };

    const amongUsColors=[
      "#C51111","#132FD2","#117F2D","#F5F557","#EF7D0D",
      "#6B2FBC","#39FEDB","#71491E","#EC54BA","#3F474E",
      "#D7E1F1","#50EF39"
    ];

    const humanColors=[
      "#e74c3c","#3498db","#2ecc71","#f1c40f","#9b59b6",
      "#e67e22","#1abc9c","#95a5a6","#ff69b4","#7f8c8d"
    ];

    let bodyColor = MATERIAL_SAMPLE_COLORS[type] || memeColors[type];
    if(type==="amongus"){
      bodyColor=amongUsColors[(Math.random()*amongUsColors.length)|0];
    }else if(type==="human"){
      bodyColor=humanColors[(Math.random()*humanColors.length)|0];
    }

    const body = bodyFromWorldVertices(vertices,{
      vel:{x:0,y:0},
      angVel:0,
      color:bodyColor,
      shapeType:type,
      material:materialFor(type)
    });

    bodies.push(body);
  }

  function pointInPolygon(point,vertices) {
    let inside = false;
    for (let i=0,j=vertices.length-1;i<vertices.length;j=i++) {
      const a = vertices[i];
      const b = vertices[j];
      const intersects =
        ((a.y>point.y)!==(b.y>point.y)) &&
        point.x < (b.x-a.x)*(point.y-a.y)/(b.y-a.y)+a.x;
      if (intersects) inside = !inside;
    }
    return inside;
  }

  function getBodyAt(point) {
    for (let i=bodies.length-1;i>=0;i--) {
      if (pointInPolygon(point,getWorldVertices(bodies[i]))) return bodies[i];
    }
    return null;
  }

  function lineSide(point,a,b) {
    return cross(sub(b,a),sub(point,a));
  }

  function segmentIntersection(a,b,c,d) {
    const r = sub(b,a);
    const s = sub(d,c);
    const denominator = cross(r,s);
    if (Math.abs(denominator)<1e-8) return null;

    const t = cross(sub(c,a),s)/denominator;
    const u = cross(sub(c,a),r)/denominator;

    if (t>=0 && t<=1 && u>=0 && u<=1) return add(a,mul(r,t));
    return null;
  }

  function cleanPolygon(points) {
    // Keep tiny slice vertices instead of deleting them with a large fixed
    // tolerance. Then remove only genuinely duplicate/collinear points.
    const clean = [];
    const epsilon = 0.06;
    for (const p of points) {
      if (!clean.length || length(sub(p,clean[clean.length-1])) > epsilon) clean.push(p);
    }
    if (clean.length > 2 && length(sub(clean[0],clean[clean.length-1])) < epsilon) clean.pop();

    let changed = true;
    while (changed && clean.length > 3) {
      changed = false;
      for (let i=0;i<clean.length;i++) {
        const previous = clean[(i-1+clean.length)%clean.length];
        const current = clean[i];
        const next = clean[(i+1)%clean.length];
        const a = sub(current,previous);
        const b = sub(next,current);
        if (length(a) < epsilon || length(b) < epsilon || Math.abs(cross(a,b)) < 0.0025) {
          clean.splice(i,1);
          changed = true;
          break;
        }
      }
    }
    return clean;
  }

  function clipByLine(vertices,a,b,positive) {
    const output = [];

    for (let i=0;i<vertices.length;i++) {
      const current = vertices[i];
      const next = vertices[(i+1)%vertices.length];
      const currentSide = lineSide(current,a,b);
      const nextSide = lineSide(next,a,b);
      const currentInside = positive ? currentSide>=0 : currentSide<=0;
      const nextInside = positive ? nextSide>=0 : nextSide<=0;

      if (currentInside) output.push(current);

      if (currentInside !== nextInside) {
        const edge = sub(next,current);
        const cut = sub(b,a);
        const denominator = cross(edge,cut);

        if (Math.abs(denominator)>1e-8) {
          const t = cross(sub(a,current),cut)/denominator;
          output.push(add(current,mul(edge,t)));
        }
      }
    }

    return cleanPolygon(output);
  }

  function velocityAtPoint(body,point) {
    const radius = sub(point,body.pos);
    return add(body.vel,mul(perpendicular(radius),body.angVel));
  }

  function segmentActuallyCrossesPolygon(a,b,vertices) {
    // A slice gesture is a finite segment, not an infinite line. Require the
    // visible swipe itself to cross the polygon boundary twice. Deduplicate
    // corner hits, where the same corner belongs to two polygon edges.
    const hits = [];
    const hitEpsilon = 0.75;

    for (let i=0;i<vertices.length;i++) {
      const hit = segmentIntersection(a,b,vertices[i],vertices[(i+1)%vertices.length]);
      if (!hit) continue;
      if (!hits.some(existing => length(sub(existing,hit)) < hitEpsilon)) hits.push(hit);
    }

    return hits.length >= 2;
  }

  function sliceCompoundBody(body,a,b) {
    const worldPolygons=getWorldDrawPolygons(body);
    const firstPolygons=[];
    const secondPolygons=[];
    let crossedPart=false;

    for (const polygon of worldPolygons) {
      if (segmentActuallyCrossesPolygon(a,b,polygon)) {
        crossedPart=true;
        const first=clipByLine(polygon,a,b,true);
        const second=clipByLine(polygon,a,b,false);
        if (first.length>=3 && Math.abs(polygonArea(first))>=.7) firstPolygons.push(first);
        if (second.length>=3 && Math.abs(polygonArea(second))>=.7) secondPolygons.push(second);
      } else if (lineSide(centroid(polygon),a,b)>=0) {
        firstPolygons.push(polygon);
      } else {
        secondPolygons.push(polygon);
      }
    }

    if (!crossedPart || !firstPolygons.length || !secondPolygons.length) return null;
    const firstArea=firstPolygons.reduce((sum,poly)=>sum+Math.abs(polygonArea(poly)),0);
    const secondArea=secondPolygons.reduce((sum,poly)=>sum+Math.abs(polygonArea(poly)),0);
    const minimumArea=clamp((firstArea+secondArea)*.0025,.7,10);
    if (firstArea<minimumArea || secondArea<minimumArea) return null;

    const groupCenter=polygons=>{
      let areaSum=0;
      let weighted={x:0,y:0};
      for (const polygon of polygons) {
        const area=Math.abs(polygonArea(polygon));
        areaSum+=area;
        weighted=add(weighted,mul(centroid(polygon),area));
      }
      return mul(weighted,1/areaSum);
    };
    const direction=normalize(sub(b,a));
    const normal=perpendicular(direction);
    const firstCenter=groupCenter(firstPolygons);
    const secondCenter=groupCenter(secondPolygons);
    const firstSide=Math.sign(lineSide(firstCenter,a,b)) || 1;
    const secondSide=Math.sign(lineSide(secondCenter,a,b)) || -1;
    const separationSpeed=paused ? 0 : 24;

    const firstBody=bodyFromCompoundPolygons(firstPolygons,{
      color:body.color,
      material:body.material,
      vel:add(velocityAtPoint(body,firstCenter),mul(normal,separationSpeed*firstSide)),
      angVel:body.angVel
    });
    const secondBody=bodyFromCompoundPolygons(secondPolygons,{
      color:body.color,
      material:body.material,
      vel:add(velocityAtPoint(body,secondCenter),mul(normal,separationSpeed*secondSide)),
      angVel:body.angVel
    });
    if (!firstBody || !secondBody) return null;
    firstBody.pos=add(firstBody.pos,mul(normal,1.2*firstSide));
    secondBody.pos=add(secondBody.pos,mul(normal,1.2*secondSide));
    return [firstBody,secondBody];
  }

  function sliceBody(body,a,b) {
    if (body.isCompound) return sliceCompoundBody(body,a,b);
    const vertices = getWorldVertices(body);

    // Do not let the infinite extension of a swipe cut an object. The mouse
    // trail must physically pass through the shape on screen.
    if (!segmentActuallyCrossesPolygon(a,b,vertices)) return null;

    // Checking which side each vertex is on is more reliable than counting
    // edge intersections. It still works on very thin pieces and when the cut
    // passes exactly through a corner.
    let minSide = Infinity;
    let maxSide = -Infinity;
    for (const vertex of vertices) {
      const side = lineSide(vertex,a,b);
      minSide = Math.min(minSide,side);
      maxSide = Math.max(maxSide,side);
    }
    if (minSide > -0.05 || maxSide < 0.05) return null;

    const first = clipByLine(vertices,a,b,true);
    const second = clipByLine(vertices,a,b,false);

    if (first.length<3 || second.length<3) return null;
    const originalArea = Math.abs(polygonArea(vertices));
    // Tiny shards are allowed, but reject mathematically degenerate slivers.
    const minimumPieceArea = clamp(originalArea*0.0025,0.7,10);
    const firstArea = Math.abs(polygonArea(first));
    const secondArea = Math.abs(polygonArea(second));
    if (firstArea < minimumPieceArea || secondArea < minimumPieceArea) return null;
    if (firstArea + secondArea < originalArea * 0.965) return null;

    const direction = normalize(sub(b,a));
    const normal = perpendicular(direction);
    const firstCenter = centroid(first);
    const secondCenter = centroid(second);
    const firstSide = Math.sign(lineSide(firstCenter,a,b)) || 1;
    const secondSide = Math.sign(lineSide(secondCenter,a,b)) || -1;
    const separationSpeed = paused ? 0 : 35;

    const firstBody = bodyFromWorldVertices(first,{
      color:body.color,
      vel:add(velocityAtPoint(body,firstCenter),mul(normal,separationSpeed*firstSide)),
      angVel:body.angVel,
      material:body.material
    });

    const secondBody = bodyFromWorldVertices(second,{
      color:body.color,
      vel:add(velocityAtPoint(body,secondCenter),mul(normal,separationSpeed*secondSide)),
      angVel:body.angVel,
      material:body.material
    });

    firstBody.pos = add(firstBody.pos,mul(normal,1.5*firstSide));
    secondBody.pos = add(secondBody.pos,mul(normal,1.5*secondSide));

    return [firstBody,secondBody];
  }

  function queueImpactBreak(body,normal,contact,damageSpeed) {
    if (!impactMode || paused || body.impactGrace>0 || body.impactGeneration>=3) return;
    if (body.radius<14 || body.mass<.024 || damageSpeed<body.material.impactStrength) return;
    const previous=impactBreakQueue.get(body.id);
    if (!previous || damageSpeed>previous.damageSpeed) {
      impactBreakQueue.set(body.id,{
        normal:{...normal},
        contact:{...contact},
        damageSpeed
      });
    }
  }

  function queueBodyImpact(a,b,collision,impactSpeed) {
    if (!impactMode || impactSpeed<=0) return;
    const reducedMass=(a.mass*b.mass)/Math.max(a.mass+b.mass,1e-8);
    const impactEnergy=.5*reducedMass*impactSpeed*impactSpeed;
    // Even a large target receives a meaningful shock wave at the contact.
    // This keeps long, heavy lines from becoming unbreakable to fast projectiles.
    const damageFor=body=>Math.max(
      impactSpeed*.62,
      Math.sqrt(2*impactEnergy/Math.max(body.mass,.001))
    );
    queueImpactBreak(a,mul(collision.normal,-1),collision.contact,damageFor(a));
    queueImpactBreak(b,collision.normal,collision.contact,damageFor(b));
  }

  function impactCut(body,hit,angleOffset=0) {
    let inward=normalize(sub(body.pos,hit.contact));
    if (length(inward)<1e-7) inward=normalize(hit.normal);
    if (length(inward)<1e-7) inward={x:0,y:-1};

    // Begin outside the struck surface and send the crack ray through the body.
    // Every fracture therefore visibly originates at the collision point.
    const direction=rotate(inward,angleOffset);
    const start=sub(hit.contact,mul(inward,Math.max(8,body.radius*.38)));
    const end=add(hit.contact,mul(direction,body.radius*3+50));
    return sliceBody(body,start,end);
  }

  function fractureBody(body,hit) {
    const severity=hit.damageSpeed/Math.max(body.material.impactStrength,1);
    const baseCuts=body.material.shatterCount || 2;
    const targetCuts=clamp(Math.round(baseCuts+Math.max(0,severity-1)*1.25),1,7);
    const jitter=(((body.id*47)%101)/100-.5)*.18;
    const offsets=[jitter,jitter+.28,jitter-.28,jitter+.5,jitter-.5,jitter+.7,jitter-.7];
    let fragments=[body];
    let cutsMade=0;

    for (let cutIndex=0;cutIndex<targetCuts;cutIndex++) {
      const candidates=fragments
        .map((fragment,index)=>({fragment,index}))
        .filter(item=>item.fragment.radius>11 && item.fragment.mass>.024)
        .sort((a,b)=>b.fragment.mass-a.fragment.mass);
      let split=false;
      for (const candidate of candidates) {
        const pieces=impactCut(candidate.fragment,hit,offsets[cutIndex]);
        if (!pieces) continue;
        fragments.splice(candidate.index,1,...pieces);
        cutsMade++;
        split=true;
        break;
      }
      if (!split) continue;
    }
    if (!cutsMade) return null;

    const burst=clamp(8+Math.max(0,severity-1)*18,8,48);
    for (const fragment of fragments) {
      fragment.impactGeneration=(body.impactGeneration||0)+1;
      fragment.impactGrace=.22;
      fragment.releaseGrace=Math.max(fragment.releaseGrace,.12);
      const radial=normalize(sub(fragment.pos,hit.contact));
      fragment.vel=add(velocityAtPoint(body,fragment.pos),mul(radial,burst));
      fragment.angVel=body.angVel;
      fragment.sleeping=false;
      fragment.sleepTimer=0;
    }
    flash=Math.max(flash,.55);
    return fragments;
  }

  function processImpactBreaks() {
    if (!impactBreakQueue.size) return;
    const nextBodies=[];
    for (const body of bodies) {
      const hit=impactBreakQueue.get(body.id);
      const fragments=hit ? fractureBody(body,hit) : null;
      if (fragments) nextBodies.push(...fragments);
      else nextBodies.push(body);
    }
    bodies=nextBodies;
    impactBreakQueue.clear();
  }

  function performSlice(a,b) {
    const nextBodies = [];
    let slicedSomething = false;

    for (const body of bodies) {
      const pieces = sliceBody(body,a,b);
      if (pieces) {
        nextBodies.push(...pieces);
        cuts++;
        slicedSomething = true;
      } else {
        nextBodies.push(body);
      }
    }

    bodies = nextBodies;
    if (slicedSomething) flash = .15;
  }

  function project(vertices,axis) {
    let min = Infinity;
    let max = -Infinity;

    for (const vertex of vertices) {
      const value = dot(vertex,axis);
      min = Math.min(min,value);
      max = Math.max(max,value);
    }

    return {min,max};
  }

  function supportPoint(vertices,direction) {
    let best = vertices[0];
    let bestValue = dot(best,direction);

    for (let i=1;i<vertices.length;i++) {
      const value = dot(vertices[i],direction);
      if (value>bestValue) {
        best = vertices[i];
        bestValue = value;
      }
    }

    return best;
  }

  function pointInConvex(point,vertices) {
    let sign = 0;
    for (let i=0;i<vertices.length;i++) {
      const side = cross(
        sub(vertices[(i+1)%vertices.length],vertices[i]),
        sub(point,vertices[i])
      );
      if (Math.abs(side)<1e-6) continue;
      const currentSign = Math.sign(side);
      if (sign && currentSign!==sign) return false;
      sign = currentSign;
    }
    return true;
  }

  function segmentIntersection(a,b,c,d) {
    const r = sub(b,a);
    const q = sub(d,c);
    const denominator = cross(r,q);
    if (Math.abs(denominator)<1e-8) return null;

    const offset = sub(c,a);
    const t = cross(offset,q)/denominator;
    const u = cross(offset,r)/denominator;
    if (t < -1e-6 || t > 1+1e-6 || u < -1e-6 || u > 1+1e-6) return null;
    return add(a,mul(r,t));
  }

  function buildContactManifold(aVertices,bVertices,normal) {
    const points = [];
    const addUnique = point => {
      if (!points.some(other=>length(sub(other,point))<.35)) points.push(point);
    };

    for (const point of aVertices) if (pointInConvex(point,bVertices)) addUnique(point);
    for (const point of bVertices) if (pointInConvex(point,aVertices)) addUnique(point);

    for (let i=0;i<aVertices.length;i++) {
      const a0=aVertices[i];
      const a1=aVertices[(i+1)%aVertices.length];
      for (let j=0;j<bVertices.length;j++) {
        const hit=segmentIntersection(
          a0,a1,bVertices[j],bVertices[(j+1)%bVertices.length]
        );
        if (hit) addUnique(hit);
      }
    }

    if (!points.length) {
      const pointOnA = supportPoint(aVertices,normal);
      const pointOnB = supportPoint(bVertices,mul(normal,-1));
      points.push(mul(add(pointOnA,pointOnB),.5));
    }

    const contact = mul(
      points.reduce((sum,point)=>add(sum,point),{x:0,y:0}),
      1/points.length
    );
    const tangent = perpendicular(normal);
    let minAlong = Infinity;
    let maxAlong = -Infinity;
    for (const point of points) {
      const along=dot(point,tangent);
      minAlong=Math.min(minAlong,along);
      maxAlong=Math.max(maxAlong,along);
    }

    return { contact, contactSpan:maxAlong-minAlong, contactCount:points.length };
  }

  function findConvexCollision(aVertices,bVertices,aCenter,bCenter) {
    let smallestOverlap = Infinity;
    let bestAxis = null;

    for (const vertices of [aVertices,bVertices]) {
      for (let i=0;i<vertices.length;i++) {
        const edge = sub(vertices[(i+1)%vertices.length],vertices[i]);
        const axis = normalize(perpendicular(edge));
        const aProjection = project(aVertices,axis);
        const bProjection = project(bVertices,axis);
        const overlap = Math.min(aProjection.max,bProjection.max)-Math.max(aProjection.min,bProjection.min);

        if (overlap<=0) return null;

        if (overlap<smallestOverlap) {
          smallestOverlap = overlap;
          bestAxis = axis;
        }
      }
    }

    if (dot(sub(bCenter,aCenter),bestAxis)<0) bestAxis = mul(bestAxis,-1);
    const manifold = buildContactManifold(aVertices,bVertices,bestAxis);

    return {
      normal:bestAxis,
      penetration:smallestOverlap,
      contact:manifold.contact,
      contactSpan:manifold.contactSpan,
      contactCount:manifold.contactCount
    };
  }

  function findCollision(a,b) {
    const aParts = getWorldParts(a);
    const bParts = getWorldParts(b);
    let best = null;

    for (const aPart of aParts) {
      const aCenter = centroid(aPart);

      for (const bPart of bParts) {
        const bCenter = centroid(bPart);
        const collision = findConvexCollision(aPart,bPart,aCenter,bCenter);

        // Keep the deepest overlapping convex pair. Choosing the shallowest
        // pair can leave most of a concave body buried inside another body.
        if (collision && (!best || collision.penetration > best.penetration)) {
          best = collision;
        }
      }
    }

    return best;
  }

  function applyImpulse(a,b,collision) {
    const normal = collision.normal;
    const ra = sub(collision.contact,a.pos);
    const rb = sub(collision.contact,b.pos);

    const velocityA = add(a.vel,mul(perpendicular(ra),a.angVel));
    const velocityB = add(b.vel,mul(perpendicular(rb),b.angVel));
    const relativeVelocity = sub(velocityB,velocityA);
    const speedAlongNormal = dot(relativeVelocity,normal);

    if (speedAlongNormal>0) return;

    // Combine the two actual materials; low-speed contacts remain inelastic
    // so stacks can still settle without perpetual micro-bounces.
    const restitution = Math.abs(speedAlongNormal)>45
      ? Math.sqrt(a.material.restitution*b.material.restitution)
      : 0;
    const raCrossN = cross(ra,normal);
    const rbCrossN = cross(rb,normal);

    // Wake bodies before calculating the impulse. The old code calculated
    // sleeping bodies as infinitely heavy and only woke them afterward,
    // which caused violent stack corrections and random wobble.
    if (speedAlongNormal < -1.2 || collision.penetration > 0.7) {
      a.sleeping = false;
      b.sleeping = false;
      a.sleepTimer = 0;
      b.sleepTimer = 0;
    }
    const aInvMass = a.invMass;
    const bInvMass = b.invMass;
    const aInvInertia = a.invInertia;
    const bInvInertia = b.invInertia;
    const denominator =
      aInvMass+bInvMass+
      raCrossN*raCrossN*aInvInertia+
      rbCrossN*rbCrossN*bInvInertia;

    if (denominator<=0) return;

    let impulseMagnitude = -(1+restitution)*speedAlongNormal/denominator;

    if (Math.abs(impulseMagnitude) > 0.08) {
      a.sleeping = false;
      b.sleeping = false;
      a.sleepTimer = 0;
      b.sleepTimer = 0;
    }

    const normalImpulse = mul(normal,impulseMagnitude);

    a.vel = sub(a.vel,mul(normalImpulse,aInvMass));
    b.vel = add(b.vel,mul(normalImpulse,bInvMass));
    a.angVel -= cross(ra,normalImpulse)*aInvInertia;
    b.angVel += cross(rb,normalImpulse)*bInvInertia;

    const afterVelocityA = add(a.vel,mul(perpendicular(ra),a.angVel));
    const afterVelocityB = add(b.vel,mul(perpendicular(rb),b.angVel));
    const afterRelative = sub(afterVelocityB,afterVelocityA);

    let tangent = sub(afterRelative,mul(normal,dot(afterRelative,normal)));
    if (length(tangent)>1e-7) tangent = normalize(tangent);

    let frictionMagnitude = -dot(afterRelative,tangent)/denominator;
    const tangentSpeed = Math.abs(dot(afterRelative,tangent));
    const friction = tangentSpeed < 18
      ? Math.sqrt(a.material.staticFriction*b.material.staticFriction)
      : Math.sqrt(a.material.dynamicFriction*b.material.dynamicFriction);
    const maxFriction = Math.abs(impulseMagnitude)*friction;
    frictionMagnitude = clamp(frictionMagnitude,-maxFriction,maxFriction);

    const frictionImpulse = mul(tangent,frictionMagnitude);
    a.vel = sub(a.vel,mul(frictionImpulse,aInvMass));
    b.vel = add(b.vel,mul(frictionImpulse,bInvMass));
    a.angVel -= cross(ra,frictionImpulse)*aInvInertia;
    b.angVel += cross(rb,frictionImpulse)*bInvInertia;
    limitMotion(a);
    limitMotion(b);
  }

  function correctPositions(a,b,collision) {
    const slop = .045;
    const percent = .22;
    if (a.sleeping && b.sleeping) return;
    const aInvMass = a.invMass;
    const bInvMass = b.invMass;
    const inverseMassSum = aInvMass+bInvMass;
    if (inverseMassSum <= 0) return;

    const correctionAmount =
      Math.max(collision.penetration-slop,0)*percent/inverseMassSum;

    const correction = mul(collision.normal,correctionAmount);
    a.pos = sub(a.pos,mul(correction,aInvMass));
    b.pos = add(b.pos,mul(correction,bInvMass));


  }

  function markSupport(body,x) {
    body.supported = true;
    body.supportMinX = Math.min(body.supportMinX,x);
    body.supportMaxX = Math.max(body.supportMaxX,x);
  }

  function markCollisionSupport(body,collision) {
    const tangent=perpendicular(collision.normal);
    const horizontalSpan=(collision.contactSpan || 0)*Math.abs(tangent.x);
    markSupport(body,collision.contact.x-horizontalSpan*.5);
    markSupport(body,collision.contact.x+horizontalSpan*.5);
  }

  function hasStableSupport(body) {
    if (!body.supported || !Number.isFinite(body.supportMinX)) return false;
    const margin = Math.max(3,body.radius*.065);
    return body.pos.x >= body.supportMinX-margin &&
      body.pos.x <= body.supportMaxX+margin;
  }

  function limitMotion(body) {
    const speed = Math.hypot(body.vel.x,body.vel.y);
    const maxSpeed = 1800;
    if (speed>maxSpeed) {
      body.vel.x *= maxSpeed/speed;
      body.vel.y *= maxSpeed/speed;
    }
    const maxAngularSpeed = clamp(1000/Math.max(body.radius,8),8,35);
    body.angVel = clamp(body.angVel,-maxAngularSpeed,maxAngularSpeed);
  }

  function applyMouseJoint(body,step) {
    const r=rotate(heldLocalPoint,body.angle);
    const worldGrab=add(body.pos,r);
    const pointVelocity=add(body.vel,mul(perpendicular(r),body.angVel));
    const error=sub(pointer,worldGrab);
    const timeScale=slowMotion ? 4 : 1;
    const cursorVelocity=estimateReleaseVelocity(mouseTrail) || {x:0,y:0};
    let targetVelocity=add(mul(cursorVelocity,timeScale),mul(error,22*timeScale));
    const targetSpeed=length(targetVelocity);
    if (targetSpeed>1800) targetVelocity=mul(targetVelocity,1800/targetSpeed);

    const deltaVelocity=sub(targetVelocity,pointVelocity);
    const k11=body.invMass+body.invInertia*r.y*r.y;
    const k12=-body.invInertia*r.x*r.y;
    const k22=body.invMass+body.invInertia*r.x*r.x;
    const determinant=k11*k22-k12*k12;
    if (determinant<=1e-9) return;

    const response=1-Math.exp(-52*step*timeScale);
    let impulse={
      x:(k22*deltaVelocity.x-k12*deltaVelocity.y)/determinant*response,
      y:(k11*deltaVelocity.y-k12*deltaVelocity.x)/determinant*response
    };
    const maxImpulse=Math.max(.08,body.mass*900);
    const impulseLength=length(impulse);
    if (impulseLength>maxImpulse) impulse=mul(impulse,maxImpulse/impulseLength);

    body.vel=add(body.vel,mul(impulse,body.invMass));
    body.angVel+=cross(r,impulse)*body.invInertia;
    limitMotion(body);
  }

  function solveWorldBounds(body) {
    const vertices = getWorldVertices(body);
    let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
    for (const v of vertices) {
      minX=Math.min(minX,v.x); maxX=Math.max(maxX,v.x);
      minY=Math.min(minY,v.y); maxY=Math.max(maxY,v.y);
    }

    const floorY=height-10;
    const wallBounce=Math.sqrt(body.material.restitution*.08);

    if (maxY>floorY) {
      const penetration=maxY-floorY;
      body.pos.y-=penetration;

      const corrected=getWorldVertices(body);
      const contacts=corrected.filter(v=>v.y>=floorY-1.25);
      const contact=contacts.length
        ? contacts.reduce((sum,v)=>add(sum,v),{x:0,y:0})
        : {x:body.pos.x,y:floorY};
      if (contacts.length) { contact.x/=contacts.length; contact.y/=contacts.length; }
      for (const floorContact of contacts.length ? contacts : [contact]) {
        markSupport(body,floorContact.x);
      }

      const r=sub(contact,body.pos);
      const pointVelocity=add(body.vel,mul(perpendicular(r),body.angVel));
      if (pointVelocity.y>0) {
        queueImpactBreak(body,{x:0,y:-1},contact,pointVelocity.y);
        const rn=r.x;
        const denom=Math.max(body.invMass+rn*rn*body.invInertia,1e-8);
        const restitution=pointVelocity.y>45
          ? Math.sqrt(body.material.restitution*.08)
          : 0;
        const j=-(1+restitution)*pointVelocity.y/denom;
        const impulse={x:0,y:j};
        body.vel=add(body.vel,mul(impulse,body.invMass));
        body.angVel+=cross(r,impulse)*body.invInertia;
      }

      // Do not erase a freshly thrown body's momentum. Friction is handled
      // once per simulation step below using time-based damping.
      if (Math.abs(body.vel.y)<10 && body.releaseGrace<=0) body.vel.y=0;
    }

    if (minX<0) {
      body.pos.x-=minX;
      if (body.vel.x<0) {
        queueImpactBreak(body,{x:1,y:0},{x:0,y:clamp(body.pos.y,0,height)},-body.vel.x);
        body.vel.x=-body.vel.x*wallBounce;
      }
    }
    if (maxX>width) {
      body.pos.x-=maxX-width;
      if (body.vel.x>0) {
        queueImpactBreak(body,{x:-1,y:0},{x:width,y:clamp(body.pos.y,0,height)},body.vel.x);
        body.vel.x=-body.vel.x*wallBounce;
      }
    }
    if (minY<0) {
      body.pos.y-=minY;
      if (body.vel.y<0) {
        queueImpactBreak(body,{x:0,y:1},{x:clamp(body.pos.x,0,width),y:0},-body.vel.y);
        body.vel.y=-body.vel.y*wallBounce;
      }
    }
  }

  function update(realDt) {
    if (paused) return;
    impactBreakQueue.clear();

    // Real frame time is clamped first; slow motion only scales simulation time.
    const clampedRealDt = clamp(realDt,0,.05);
    const dt = clampedRealDt * (slowMotion ? .25 : 1);

    const fastestBodySpeed = bodies.reduce((fastest,body) =>
      Math.max(fastest,Math.hypot(body.vel.x,body.vel.y)),0);
    const smallestThickness=bodies.reduce((smallest,body) =>
      Math.min(smallest,body.collisionThickness || body.radius),60);
    const travelSteps=Math.ceil(fastestBodySpeed*dt/Math.max(3,smallestThickness*.38));
    const speedSteps=Math.ceil(6+fastestBodySpeed/420);
    const substeps=clamp(Math.max(6,travelSteps,speedSteps),6,18);
    const step = dt/substeps;
    const gravity = 900;

    for (let s=0;s<substeps;s++) {
      for (const body of bodies) {
        body.supported = false;
        body.supportMinX = Infinity;
        body.supportMaxX = -Infinity;
      }
      for (const body of bodies) {
        if (!body.sleeping) {
          body.vel.y += gravity*body.material.gravityScale*step;
          body.vel.x += wind*step;

          const linearDamping = Math.exp(-body.material.airDrag*step);
          const angularDamping = Math.exp(-body.material.angularDrag*step);
          body.vel.x *= linearDamping;
          body.vel.y *= linearDamping;
          body.angVel *= angularDamping;
          limitMotion(body);
        }

        if (body===heldBody) {
          body.sleeping=false;
          body.sleepTimer=0;
          applyMouseJoint(body,step);
        }

        if (!body.sleeping) {
          body.pos = add(body.pos,mul(body.vel,step));
          body.angle += body.angVel*step;
          solveWorldBounds(body);

          body.releaseGrace = Math.max(0,(body.releaseGrace||0)-step);
          body.impactGrace = Math.max(0,(body.impactGrace||0)-step);
          const vertices = getWorldVertices(body);
          const onFloor = vertices.some(vertex => vertex.y >= height-11.2);

          if (onFloor) {
            // Strong settling drag belongs only on a broad, stable support.
            // Applying it on a single corner fights the torque from gravity.
            const stableOnFloor = hasStableSupport(body);
            const floorLinearDrag = body.releaseGrace>0
              ? .16*body.material.floorDrag
              : stableOnFloor
                ? (1.15+4.2*body.material.dynamicFriction)*body.material.floorDrag
                : (.8+2.4*body.material.dynamicFriction)*body.material.floorDrag;
            const floorAngularDrag = body.releaseGrace>0
              ? .10*body.material.floorDrag
              : stableOnFloor
                ? (.9+3.5*body.material.dynamicFriction)*body.material.floorDrag
                : .04;
            body.vel.x *= Math.exp(-floorLinearDrag*step);
            body.angVel *= Math.exp(-floorAngularDrag*step);
          }
        }
      }

      // Re-detect collisions every solver pass. The old solver reused one
      // stale contact even after bodies moved, which could push them farther
      // together or leave visible overlap in stacks.
      for (let iteration=0;iteration<10;iteration++) {
        let foundCollision = false;

        for (let i=0;i<bodies.length;i++) {
          for (let j=i+1;j<bodies.length;j++) {
            const a = bodies[i];
            const b = bodies[j];

            if (length(sub(a.pos,b.pos))>a.radius+b.radius+2) continue;

            const collision = findCollision(a,b);
            if (!collision) continue;
            foundCollision = true;

            const relative = sub(velocityAtPoint(b,collision.contact),velocityAtPoint(a,collision.contact));
            const impactSpeed = Math.max(0,-dot(relative,collision.normal));
            queueBodyImpact(a,b,collision,impactSpeed);
            const hardImpact = impactSpeed > 55 || collision.penetration > 3.4;
            if (hardImpact) {
              a.sleeping = false;
              b.sleeping = false;
              a.sleepTimer = 0;
              b.sleepTimer = 0;
            }

            // Mark whichever body is above a mostly vertical contact as supported.
            if (collision.normal.y > .45) markCollisionSupport(a,collision);
            if (collision.normal.y < -.45) markCollisionSupport(b,collision);

            // Fully sleeping stacks do not need another impulse every solver pass.
            if (!(a.sleeping && b.sleeping)) {
              applyImpulse(a,b,collision);
              correctPositions(a,b,collision);
            }
          }
        }

        if (!foundCollision) break;
      }

      // Position correction can move a body slightly through a wall/floor.
      // Clamp world bounds again after resolving body-to-body contacts.
      for (const body of bodies) solveWorldBounds(body);

      // One authoritative sleep pass prevents floor bodies from accumulating
      // sleep time twice and freezing before a stack is actually stable.
      for (const body of bodies) {
        if (body.sleeping) continue;
        if (body===heldBody || body.releaseGrace>0 || !hasStableSupport(body)) {
          body.sleepTimer=0;
          continue;
        }
        const speed = Math.hypot(body.vel.x,body.vel.y);
        if (speed < 9 && Math.abs(body.angVel) < .075) {
          body.sleepTimer += step;
          body.vel.x *= Math.exp(-10*step);
          if (Math.abs(body.vel.y) < 3.5) body.vel.y = 0;
          body.angVel *= Math.exp(-12*step);
          if (body.sleepTimer >= body.material.sleepDelay) {
            body.vel.x = 0;
            body.vel.y = 0;
            body.angVel = 0;
            body.sleeping = true;
          }
        } else {
          body.sleepTimer = 0;
        }
      }
    }

    wind *= Math.pow(.25,dt);
    if (flash>0) flash *= Math.pow(.72,clampedRealDt*60);
    if (helpRemaining>0) {
      helpRemaining -= clampedRealDt;
      if (helpRemaining<=0) document.getElementById("help").classList.add("hidden");
    }
    processImpactBreaks();
    bodies = bodies.filter(body =>
      body.pos.y<height+800 &&
      body.pos.x>-800 &&
      body.pos.x<width+800
    );
  }

  function drawBackground() {
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0,0,width,height);

    ctx.fillStyle = "#000000";
    ctx.fillRect(0,height-10,width,10);
  }

    const xs = body.verts.map(p=>p.x);
    const ys = body.verts.map(p=>p.y);

  function drawMaterialDetails(context,body) {
    if (!MATERIAL_SAMPLE_TYPES.has(body.shapeType)) return;
    const xs=body.verts.map(point=>point.x);
    const ys=body.verts.map(point=>point.y);
    const minX=Math.min(...xs), maxX=Math.max(...xs);
    const minY=Math.min(...ys), maxY=Math.max(...ys);
    const w=maxX-minX, h=maxY-minY;
    context.save();
    context.translate(body.pos.x,body.pos.y);
    context.rotate(body.angle);
    context.lineWidth=Math.max(1,Math.min(w,h)*.035);
    context.strokeStyle="rgba(30,35,40,.42)";
    context.fillStyle="rgba(255,255,255,.42)";

    if (body.shapeType==="materialglass" || body.shapeType==="materialice") {
      context.beginPath();
      context.moveTo(minX+w*.18,maxY-h*.12);
      context.lineTo(maxX-w*.2,minY+h*.1);
      context.moveTo(minX+w*.48,maxY-h*.1);
      context.lineTo(maxX-w*.1,minY+h*.38);
      context.strokeStyle="rgba(255,255,255,.8)";
      context.stroke();
    } else if (body.shapeType==="materialwood") {
      context.beginPath();
      context.moveTo(minX+w*.12,minY+h*.34); context.lineTo(maxX-w*.12,minY+h*.28);
      context.moveTo(minX+w*.12,minY+h*.68); context.lineTo(maxX-w*.12,minY+h*.75);
      context.stroke();
    } else if (body.shapeType==="materialmetal") {
      context.beginPath();
      context.moveTo(minX+w*.1,minY+h*.25); context.lineTo(maxX-w*.1,minY+h*.25);
      context.moveTo(minX+w*.1,maxY-h*.25); context.lineTo(maxX-w*.1,maxY-h*.25);
      context.strokeStyle="rgba(255,255,255,.48)";
      context.stroke();
    } else if (body.shapeType==="materialstone" || body.shapeType==="materialfoam") {
      for (const [px,py] of [[.25,.28],[.68,.22],[.48,.58],[.22,.76],[.76,.72]]) {
        context.beginPath();
        context.arc(minX+w*px,minY+h*py,Math.max(1,Math.min(w,h)*.035),0,Math.PI*2);
        context.fill();
      }
    } else if (body.shapeType==="materialrubber") {
      context.beginPath();
      context.moveTo(minX+w*.2,minY+h*.5); context.lineTo(maxX-w*.2,minY+h*.5);
      context.moveTo(minX+w*.5,minY+h*.2); context.lineTo(minX+w*.5,maxY-h*.2);
      context.stroke();
    } else if (body.shapeType==="materialceramic") {
      context.strokeStyle="rgba(85,100,120,.45)";
      context.strokeRect(minX+w*.12,minY+h*.12,w*.76,h*.76);
    }
    context.restore();
  }

  function drawBody(body) {
    const polygons = getWorldDrawPolygons(body);

    ctx.save();
    ctx.beginPath();
    for (const vertices of polygons) {
      ctx.moveTo(vertices[0].x,vertices[0].y);
      for (let i=1;i<vertices.length;i++) ctx.lineTo(vertices[i].x,vertices[i].y);
      ctx.closePath();
    }

    ctx.shadowColor = "rgba(0,0,0,.26)";
    ctx.shadowBlur = 7;
    ctx.shadowOffsetX = 3;
    ctx.shadowOffsetY = 4;
    ctx.fillStyle = body.color;
    ctx.fill();

    ctx.shadowColor = "transparent";
    ctx.lineWidth = 2;
    ctx.strokeStyle = "#34302c";
    ctx.stroke();

    ctx.globalAlpha = .18;
    ctx.beginPath();
    for (const vertices of polygons) {
      ctx.moveTo(vertices[0].x,vertices[0].y);
      for (let i=1;i<Math.min(3,vertices.length);i++) ctx.lineTo(vertices[i].x,vertices[i].y);
    }
    ctx.strokeStyle = "white";
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.restore();
    drawMemeDetails(ctx,body);
    drawMaterialDetails(ctx,body);
  }

  function pointerPosition(event) {
    const rect = canvas.getBoundingClientRect();
    return {
      x:event.clientX-rect.left,
      y:event.clientY-rect.top
    };
  }

  function recordMouseTrail(event) {
    const samples=typeof event.getCoalescedEvents==="function"
      ? event.getCoalescedEvents()
      : [event];
    const source=samples.length ? samples : [event];
    for (const sample of source) {
      const p=pointerPosition(sample);
      const time=Number.isFinite(sample.timeStamp) ? sample.timeStamp : performance.now();
      const last=mouseTrail[mouseTrail.length-1];
      if (!last || time>last.time || length(sub(p,last))>.05) {
        mouseTrail.push({...p,time});
      }
    }
    const newest=mouseTrail[mouseTrail.length-1]?.time || 0;
    while (mouseTrail.length>32 || (mouseTrail.length>2 && newest-mouseTrail[0].time>220)) {
      mouseTrail.shift();
    }
  }

  function estimateReleaseVelocity(samples,referenceTime=performance.now()) {
    if (samples.length<2) return null;
    let motionEnd=-1;
    for (let i=samples.length-1;i>0;i--) {
      if (length(sub(samples[i],samples[i-1]))>.35) {
        motionEnd=i;
        break;
      }
    }
    if (motionEnd<1) return null;

    const endTime=samples[motionEnd].time;
    if (referenceTime-endTime>160) return null;
    let velocity={x:0,y:0};
    let totalWeight=0;
    for (let i=1;i<=motionEnd;i++) {
      const current=samples[i];
      const previous=samples[i-1];
      const dt=(current.time-previous.time)/1000;
      const delta=sub(current,previous);
      const distance=length(delta);
      const age=endTime-current.time;
      if (dt<=.001 || dt>.12 || distance<.1 || age>150) continue;

      let segmentVelocity=mul(delta,1/dt);
      const segmentSpeed=length(segmentVelocity);
      if (segmentSpeed>2400) segmentVelocity=mul(segmentVelocity,2400/segmentSpeed);
      const weight=Math.exp(-age/55)*clamp(distance/3,.3,3);
      velocity=add(velocity,mul(segmentVelocity,weight));
      totalWeight+=weight;
    }
    return totalWeight>0 ? mul(velocity,1/totalWeight) : null;
  }

    if (type==="compound") return [{x:16,y:24},{x:44,y:24},{x:44,y:10},{x:56,y:10},{x:56,y:24},{x:84,y:24},{x:84,y:36},{x:56,y:36},{x:56,y:50},{x:44,y:50},{x:44,y:36},{x:16,y:36}];
