    if (type==="triangle") return regularPolygon(cx,cy,r,3,-Math.PI/2);
    if (type==="pentagon") return regularPolygon(cx,cy,r,5,-Math.PI/2);
    if (type==="hexagon") return regularPolygon(cx,cy,r,6,0);
    if (type==="octagon") return regularPolygon(cx,cy,r,8,Math.PI/8);
    if (type==="circle") return regularPolygon(cx,cy,r,24,0);

    const oldSize = ui.sizeSlider.value;
    ui.sizeSlider.value = 22;
    const before = bodies.length;
    spawn(cx,cy,type);
    const body = bodies.pop();
    ui.sizeSlider.value = oldSize;
    if (!body || bodies.length !== before) return regularPolygon(cx,cy,r,4,0);
    return getWorldVertices(body);
  }

  function drawPreview(canvas,type) {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const cssWidth = Math.max(90, Math.round(canvas.clientWidth || 120));
    const cssHeight = Math.max(52, Math.round(canvas.clientHeight || cssWidth * 9 / 16));

    canvas.width = Math.round(cssWidth * dpr);
    canvas.height = Math.round(cssHeight * dpr);

    const preview = canvas.getContext("2d");
    preview.setTransform(dpr,0,0,dpr,0,0);
    preview.clearRect(0,0,cssWidth,cssHeight);
    preview.fillStyle="#f7f7f7";
    preview.fillRect(0,0,cssWidth,cssHeight);

    const points = previewPoints(type);
    let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;

    for (const point of points) {
      minX=Math.min(minX,point.x);
      maxX=Math.max(maxX,point.x);
      minY=Math.min(minY,point.y);
      maxY=Math.max(maxY,point.y);
    }

    const padding = 8;
    const availableWidth = Math.max(1, cssWidth - padding*2);
    const availableHeight = Math.max(1, cssHeight - padding*2);
    const shapeWidth = Math.max(1, maxX-minX);
    const shapeHeight = Math.max(1, maxY-minY);
    const scale = Math.min(availableWidth/shapeWidth, availableHeight/shapeHeight);

    const centerX=(minX+maxX)*.5;
    const centerY=(minY+maxY)*.5;
    const offsetX=cssWidth*.5-centerX*scale;
    const offsetY=cssHeight*.5-centerY*scale;

    preview.beginPath();
    preview.moveTo(points[0].x*scale+offsetX,points[0].y*scale+offsetY);

    for (let i=1;i<points.length;i++) {
      preview.lineTo(points[i].x*scale+offsetX,points[i].y*scale+offsetY);
    }

    preview.closePath();
    preview.fillStyle = MATERIAL_SAMPLE_COLORS[type] || (type==="random" ? "#8a8a8a" : "#d7bd53");
    preview.fill();
    preview.lineWidth=1.5;
    preview.strokeStyle="#111";
    preview.stroke();

    if (["tungtung","tralalero","bombardino","capybara","doge","cheems","shrekhead","toilet","banana","amongus","creeper","human","enderman","astronaut","ninja","knight"].includes(type)) {
      const localVerts = points.map(p=>({
        x:(p.x*scale+offsetX)-cssWidth*.5,
        y:(p.y*scale+offsetY)-cssHeight*.5
      }));
      drawMemeDetails(preview,{
        shapeType:type,
        verts:localVerts,
        pos:{x:cssWidth*.5,y:cssHeight*.5},
        angle:0
      });
    }
    if (MATERIAL_SAMPLE_TYPES.has(type)) {
      const localVerts=points.map(point=>({
        x:(point.x*scale+offsetX)-cssWidth*.5,
        y:(point.y*scale+offsetY)-cssHeight*.5
      }));
      drawMaterialDetails(preview,{
        shapeType:type,
        verts:localVerts,
        pos:{x:cssWidth*.5,y:cssHeight*.5},
        angle:0
      });
    }
  }

  function renderCategoryFilters() {
    const currentScroll = ui.categoryFilters.scrollLeft;
    const categories = ["all", ...new Set(spawnables.map(item => item.tag))];

    ui.categoryFilters.innerHTML = "";

    for (const category of categories) {
      const button = document.createElement("button");
      button.className = "category-filter" + (category===selectedSpawnCategory ? " active" : "");
      button.textContent = category;

      button.onclick = () => {
        selectedSpawnCategory = category;
        renderCategoryFilters();
        renderSpawnOptions(ui.spawnSearch.value, true);
      };

      ui.categoryFilters.appendChild(button);
    }

    ui.categoryFilters.scrollLeft = currentScroll;
  }

  function renderSpawnOptions(query="", preserveScroll=false) {
    const oldScrollTop = preserveScroll ? ui.spawnOptions.scrollTop : 0;
    const cleaned = query.trim().toLowerCase();

    const matches = spawnables.filter(item => {
      const matchesSearch =
        item.name.includes(cleaned) ||
        item.tag.includes(cleaned) ||
        item.id.includes(cleaned);

      const matchesCategory =
        selectedSpawnCategory==="all" ||
        item.tag===selectedSpawnCategory;

      return matchesSearch && matchesCategory;
    });

    ui.spawnOptions.innerHTML = "";

    for (const item of matches) {
      const button = document.createElement("button");
      button.className = "spawn-option" + (item.id===selectedSpawnType ? " selected" : "");

      const preview = document.createElement("canvas");
      preview.className = "spawn-preview";
      preview.dataset.shapeType = item.id;
      preview.width = 120;
      preview.height = 68;

      const name = document.createElement("span");
      name.className = "spawn-option-name";
      name.textContent = item.name;
      name.title = item.name;
      button.title = item.name;

      const tag = document.createElement("small");
      tag.textContent = item.tag;

      button.append(preview,name,tag);

      button.onclick = () => {
        const savedScroll = ui.spawnOptions.scrollTop;
        selectedSpawnType = item.id;
        ui.selectedSpawn.textContent = "selected: " + item.name;
        setMode(mode);
        renderSpawnOptions(ui.spawnSearch.value, true);

        requestAnimationFrame(() => {
          ui.spawnOptions.scrollTop = savedScroll;
        });
      };

      ui.spawnOptions.appendChild(button);
      drawPreview(preview,item.id);
    }

    if (!matches.length) {
      const empty = document.createElement("div");
      empty.style.padding = "9px";
      empty.style.fontSize = "11px";
      empty.textContent = "nothing found";
      ui.spawnOptions.appendChild(empty);
    }

    if (preserveScroll) {
      requestAnimationFrame(() => {
        ui.spawnOptions.scrollTop = oldScrollTop;
      });
    }
  }
if ("ResizeObserver" in window) {
    const spawnPanelResizeObserver = new ResizeObserver(() => {
      requestAnimationFrame(() => {
        document.querySelectorAll(".spawn-preview").forEach(canvas => {
          drawPreview(canvas, canvas.dataset.shapeType);
        });
      });
    });

    spawnPanelResizeObserver.observe(ui.spawnPanel);
  }

  function clampSpawnPanelToViewport() {
    const rect = ui.spawnPanel.getBoundingClientRect();
    const maxLeft = Math.max(0, window.innerWidth - rect.width);
    const maxTop = Math.max(0, window.innerHeight - rect.height);

    const currentLeft = Number.parseFloat(ui.spawnPanel.style.left);
    const currentTop = Number.parseFloat(ui.spawnPanel.style.top);

    const left = Number.isFinite(currentLeft) ? currentLeft : rect.left;
    const top = Number.isFinite(currentTop) ? currentTop : rect.top;

    ui.spawnPanel.style.left = clamp(left, 0, maxLeft) + "px";
    ui.spawnPanel.style.top = clamp(top, 0, maxTop) + "px";
    ui.spawnPanel.style.right = "auto";
  }

  window.addEventListener("resize", clampSpawnPanelToViewport);

  let spawnPanelDrag = null;

  ui.spawnPanelHeader.addEventListener("pointerdown", event => {
    if (event.button !== 0) return;
    const rect = ui.spawnPanel.getBoundingClientRect();
    spawnPanelDrag = {
      offsetX: event.clientX - rect.left,
      offsetY: event.clientY - rect.top
    };
    ui.spawnPanelHeader.setPointerCapture(event.pointerId);
  });

  ui.spawnPanelHeader.addEventListener("pointermove", event => {
    if (!spawnPanelDrag) return;

    const panelWidth = ui.spawnPanel.getBoundingClientRect().width;
    const panelHeight = ui.spawnPanel.getBoundingClientRect().height;
    const maxLeft = innerWidth - panelWidth;
    const maxTop = innerHeight - panelHeight;

    const left = clamp(event.clientX - spawnPanelDrag.offsetX, 0, Math.max(0,maxLeft));
    const top = clamp(event.clientY - spawnPanelDrag.offsetY, 0, Math.max(0,maxTop));

    ui.spawnPanel.style.left = left + "px";
    ui.spawnPanel.style.top = top + "px";
    ui.spawnPanel.style.right = "auto";
  });

  function stopSpawnPanelDrag() {
    spawnPanelDrag = null;
  }

  ui.spawnPanelHeader.addEventListener("pointerup", stopSpawnPanelDrag);
  ui.spawnPanelHeader.addEventListener("pointercancel", stopSpawnPanelDrag);

  ui.spawnSearch.addEventListener("input", () => {
    renderSpawnOptions(ui.spawnSearch.value, false);
  });

  renderCategoryFilters();
  renderSpawnOptions();


  function segmentPolygon(start,end,thickness) {
    const delta=sub(end,start);
    if (length(delta)<8) return null;
    const n=mul(perpendicular(normalize(delta)),thickness*.5);
    return [add(start,n),add(end,n),sub(end,n),sub(start,n)];
  }

  function finalizeWeldDraft() {
    if (!weldDraftParts.length) return;
    const body=bodyFromCompoundPolygons(weldDraftParts,{
      color:weldDraftColor,
      material:materialFor("compound")
    });
    if (body) bodies.push(body);
    weldDraftParts=[];
    weldDraftColor=null;
  }

  function createDraggedShape(type,start,end) {
    if (type==="line") {
      const thickness=Math.max(4,Number(ui.sizeSlider.value)||12);
      const vertices=segmentPolygon(start,end,thickness);
      if (!vertices) return;
      const body=bodyFromWorldVertices(vertices,{color:palette[Math.floor(Math.random()*palette.length)],shapeType:"line",material:materialFor("line")});
      bodies.push(body);
    } else if (type==="rectangle") {
      if (Math.abs(end.x-start.x)<6 || Math.abs(end.y-start.y)<6) return;
      const vertices=[
        {x:start.x,y:start.y},{x:end.x,y:start.y},
        {x:end.x,y:end.y},{x:start.x,y:end.y}
      ];
      const body=bodyFromWorldVertices(vertices,{color:palette[Math.floor(Math.random()*palette.length)],shapeType:"rectangle",material:materialFor("rectangle")});
      bodies.push(body);
    } else if (type==="compound" && paused) {
      const thickness=Math.max(6,Number(ui.sizeSlider.value)||18);
      const vertices=segmentPolygon(start,end,thickness);
      if (!vertices) return;
      if (!weldDraftColor) weldDraftColor=palette[Math.floor(Math.random()*palette.length)];
      weldDraftParts.push(vertices);
    }
  }

function setMode(nextMode) {
    mode = nextMode;

    document.querySelectorAll("[data-mode]").forEach(button => {
      button.classList.toggle("active", button.dataset.mode === mode);
    });

    canvas.style.cursor = (!paused && mode==="spawn" && selectedSpawnType==="compound") ||
      (paused && mode!=="slice" && mode!=="spawn" && mode!=="delete") ? "not-allowed" :
      mode === "drag" ? "grab" :
      mode === "spawn" ? "copy" :
      mode === "delete" ? "not-allowed" :
      "crosshair";

    ui.spawnPanel.classList.toggle("visible", mode === "spawn");

    if (mode === "spawn" && !ui.spawnPanel.dataset.positioned) {
      const rect = ui.spawnPanel.getBoundingClientRect();
      ui.spawnPanel.style.left = Math.max(0, window.innerWidth - rect.width - 14) + "px";
      ui.spawnPanel.style.top = "14px";
      ui.spawnPanel.style.right = "auto";
      ui.spawnPanel.dataset.positioned = "true";
    }
  }


  canvas.addEventListener("pointerdown",event=>{
    // Right-click spawning is handled once by the contextmenu event below.
    if (event.button!==0) return;
    const p = pointerPosition(event);
    pointer.x = p.x;
    pointer.y = p.y;
    const pausedEditMode = mode==="slice" || mode==="spawn" || mode==="delete";
    if (paused && !pausedEditMode) return;
    pointer.down = true;
    canvas.setPointerCapture(event.pointerId);

    if (mode==="slice") {
      sliceStart = p;
    } else if (mode==="spawn") {
      if (selectedSpawnType==="compound" && !paused) return;
      if (selectedSpawnType==="line" || selectedSpawnType==="rectangle" || selectedSpawnType==="compound") {
        drawSpawnStart={...p};
      } else {
        spawn(p.x,p.y);
      }
    } else if (mode==="delete") {
      const body = getBodyAt(p);
      if (body) bodies = bodies.filter(item=>item!==body);
    } else if (mode==="drag") {
      heldBody = getBodyAt(p);
      if (heldBody) {
        heldBody.sleeping = false;
        heldBody.sleepTimer = 0;
        heldLocalPoint = rotate(sub(p,heldBody.pos),-heldBody.angle);
        mouseTrail = [];
        recordMouseTrail(event);
        canvas.style.cursor = "grabbing";
      }
    }
  });

  canvas.addEventListener("pointermove",event=>{
    const p = pointerPosition(event);
    pointer.x = p.x;
    pointer.y = p.y;

    if (!paused && heldBody) {
      recordMouseTrail(event);
    }
  });

  canvas.addEventListener("pointerup",event=>{
    const p = pointerPosition(event);
    pointer.x = p.x;
    pointer.y = p.y;
    pointer.down = false;
    const pausedEditMode = mode==="slice" || mode==="spawn" || mode==="delete";
    if (paused && !pausedEditMode) return;

    if (mode==="slice" && sliceStart && length(sub(p,sliceStart))>10) {
      performSlice(sliceStart,p);
    }
    if (mode==="spawn" && drawSpawnStart) {
      createDraggedShape(selectedSpawnType,drawSpawnStart,p);
      drawSpawnStart=null;
    }

    sliceStart = null;

    if (heldBody) {
      recordMouseTrail(event);
      const releaseVelocity=estimateReleaseVelocity(mouseTrail);
      if (releaseVelocity) {
        // Match velocity at the grabbed point while retaining the angular
        // momentum created by an off-center throw.
        const worldOffset=rotate(heldLocalPoint,heldBody.angle);
        const rotationalVelocity=mul(perpendicular(worldOffset),heldBody.angVel);
        const targetCenterVelocity=sub(releaseVelocity,rotationalVelocity);
        heldBody.vel = {
          x:heldBody.vel.x*.08 + targetCenterVelocity.x*.92,
          y:heldBody.vel.y*.08 + targetCenterVelocity.y*.92
        };
        limitMotion(heldBody);
      }
      heldBody.releaseGrace = 0.42;
      heldBody.sleeping = false;
      heldBody.sleepTimer = 0;

      heldBody = null;
      heldLocalPoint = null;
      mouseTrail = [];
      canvas.style.cursor = "grab";
    }
  });

  function cancelActiveInteraction() {
    drawSpawnStart=null;
    heldBody=null;
    heldLocalPoint=null;
    mouseTrail=[];
    sliceStart=null;
    pointer.down=false;
    setMode(mode);
  }

  canvas.addEventListener("pointercancel",cancelActiveInteraction);

  canvas.addEventListener("contextmenu",event=>{
    event.preventDefault();
    const p = pointerPosition(event);
    spawn(p.x,p.y);
  });



  document.querySelectorAll("[data-mode]").forEach(button=>{
    button.addEventListener("click",()=>setMode(button.dataset.mode));
  });

  document.getElementById("spawnTen").onclick = ()=>{
    for (let i=0;i<10;i++) {
      spawn(width*.32+Math.random()*width*.62,20+Math.random()*100);
    }
  };

  function resetWorld() {
    bodies = [];
    cuts = 0;
    cancelActiveInteraction();
    weldDraftParts = [];
    weldDraftColor = null;
    impactBreakQueue.clear();
  }

  document.getElementById("reset").onclick = resetWorld;

  function setPaused(nextPaused) {
    if (paused === nextPaused) return;
    if (paused && !nextPaused) finalizeWeldDraft();
    paused = nextPaused;

    if (paused) {
      // End active grabs/deletes; Slice and Spawn become deliberate pause-edit tools.
      cancelActiveInteraction();
    }

    // Discard wall-clock time spent paused so resuming cannot create a jump.
    previousTime = performance.now();
    ui.pause.textContent = paused ? "Resume" : "Pause";
    ui.pause.setAttribute("aria-pressed", String(paused));
    ui.pause.classList.toggle("active",paused);
    setMode(mode);
  }

  ui.pause.onclick = () => setPaused(!paused);

  function setSlowMotion(nextSlowMotion) {
    slowMotion = nextSlowMotion;
    ui.slow.classList.toggle("active",slowMotion);
    ui.slow.setAttribute("aria-pressed",String(slowMotion));
  }

  ui.slow.onclick = ()=>setSlowMotion(!slowMotion);

  function setImpactMode(nextImpactMode) {
    impactMode = nextImpactMode;
    impactBreakQueue.clear();
    ui.impact.textContent = impactMode ? "Impact: on" : "Impact: off";
    ui.impact.setAttribute("aria-pressed",String(impactMode));
    ui.impact.classList.toggle("active",impactMode);
  }

  ui.impact.onclick = ()=>setImpactMode(!impactMode);

  
  
  addEventListener("keydown",event=>{
    const target = event.target;
    const typing = target instanceof HTMLInputElement ||
      target instanceof HTMLTextAreaElement ||
      target instanceof HTMLSelectElement ||
      target?.isContentEditable;

    if (event.code==="Space") {
      if (typing || event.repeat) return;
      event.preventDefault();
      setPaused(!paused);
    } else if (event.key==="Escape") {
      if (typing) return;
      cancelActiveInteraction();
    } else if (event.key.toLowerCase()==="r") {
      if (typing) return;
      resetWorld();
    } else if (event.key.toLowerCase()==="s") {
      if (typing || event.repeat) return;
      setSlowMotion(!slowMotion);
    } else if (event.key.toLowerCase()==="i") {
      if (typing || event.repeat) return;
      setImpactMode(!impactMode);
    } else if (event.key==="1") {
      if (typing) return;
      setMode("slice");
    } else if (event.key==="2") {
      if (typing) return;
      setMode("drag");
    } else if (event.key==="3") {
      if (typing) return;
      setMode("spawn");
    } else if (event.key==="4") {
      if (typing) return;
      setMode("delete");
    }
  });

  
  ui.sizeSlider.oninput = () => {
    if (Number(ui.sizeSlider.value) === 0) {
      ui.sizeValue.textContent = "Random";
    } else {
      ui.sizeValue.textContent = ui.sizeSlider.value + " px";
    }
  };

  addEventListener("resize",resize);
  addEventListener("visibilitychange",() => {
    previousTime = performance.now();
    if (document.hidden) cancelActiveInteraction();
  });
  resize();
  resetWorld();
  setMode(mode);

  function frame(now) {
    const dt = (now-previousTime)/1000;
    previousTime = now;
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
