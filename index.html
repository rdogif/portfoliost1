<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Rishan's Test</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      color: #222;
    }

    header {
      background: white;
      border-bottom: 1px solid #d8d8d8;
      padding: 24px;
      text-align: center;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    header p {
      margin: 0;
      color: #666;
    }

    main {
      width: min(700px, calc(100% - 32px));
      margin: 32px auto;
    }

    .project {
      background: white;
      border: 1px solid #d8d8d8;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .project h2 {
      margin: 0 0 8px;
      font-size: 21px;
    }

    .project p {
      margin: 0 0 16px;
      color: #555;
      line-height: 1.5;
    }

    .project-button {
      display: inline-block;
      padding: 10px 16px;
      background: #222;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .project-button:hover {
      background: #444;
    }

    footer {
      text-align: center;
      padding: 24px;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>

<body>

    <h1>Rishan's Test</h1>

  <main>

  Open Project
