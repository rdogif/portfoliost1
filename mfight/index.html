let audioContext = null;
let soundEnabled = true;

function initAudio() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioContext.state === "suspended") {
    audioContext.resume();
  }
}

function playTone(frequency, duration = 0.08, type = "square", volume = 0.08, slideTo = null) {
  if (!soundEnabled) return;
  initAudio();

  const oscillator = audioContext.createOscillator();
  const gain = audioContext.createGain();
  const now = audioContext.currentTime;

  oscillator.type = type;
  oscillator.frequency.setValueAtTime(frequency, now);

  if (slideTo !== null) {
    oscillator.frequency.exponentialRampToValueAtTime(
      Math.max(20, slideTo),
      now + duration
    );
  }

  gain.gain.setValueAtTime(volume, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

  oscillator.connect(gain);
  gain.connect(audioContext.destination);

  oscillator.start(now);
  oscillator.stop(now + duration);
}

function playPunchSound() {
  playTone(150, 0.07, "square", 0.09, 70);
}

function playKickSound() {
  playTone(110, 0.11, "sawtooth", 0.1, 45);
}

function playBlockSound() {
  playTone(520, 0.06, "square", 0.06, 330);
  setTimeout(() => playTone(740, 0.05, "square", 0.04, 500), 35);
}

function playCountdownSound() {
  playTone(440, 0.12, "sine", 0.07);
}

function playWinnerSound() {
  playTone(523, 0.16, "sine", 0.08);
  setTimeout(() => playTone(659, 0.16, "sine", 0.08), 170);
  setTimeout(() => playTone(784, 0.28, "sine", 0.09), 340);
}

document.addEventListener("pointerdown", initAudio, { once: true });

function generateMonkeyName(excluded = []) {
  for (let tries = 0; tries < 100; tries++) {
    let name;
    const roll = Math.random();

    if (roll < 0.18) {
      name = randomItem(monkeyNames);
    } else if (roll < 0.70) {
      name = randomItem(nameStarts) + " " + randomItem(nameEnds);
    } else {
      name = randomItem(sillyFirstNames) + " " + randomItem(sillyTitles);
    }

    if (!excluded.includes(name)) return name;
  }

  return "Mystery Monkey " + Math.floor(Math.random() * 9999);
}

function randomName(excluded = []) {
  return generateMonkeyName(excluded);
}

function rememberDefeatedMonkey(monkey) {
  const existingIndex = defeatedMonkeys.findIndex(entry => entry.name === monkey.name);

  const savedMonkey = {
    name: monkey.name,
    color: monkey.color,
    faceColor: monkey.faceColor,
    losses: (monkey.losses || 0) + 1,
    returns: monkey.returns || 0,
    streak: 0
  };

  if (existingIndex >= 0) {
    savedMonkey.losses = defeatedMonkeys[existingIndex].losses + 1;
    savedMonkey.returns = defeatedMonkeys[existingIndex].returns || 0;
    defeatedMonkeys[existingIndex] = savedMonkey;
  } else {
    defeatedMonkeys.push(savedMonkey);
  }

  // Keep the pool from growing forever.
  if (defeatedMonkeys.length > 80) {
    defeatedMonkeys.shift();
  }
}

function getReturningChallenger(excludedNames = []) {
  const available = defeatedMonkeys.filter(monkey => !excludedNames.includes(monkey.name));

  if (available.length === 0) {
    return null;
  }

  // Normal chance is 35%. If four eligible rounds pass without a return,
  // the next eligible challenger is guaranteed to be a returning monkey.
  const guaranteedReturn =
    roundsWithoutReturn >= 4 ||
    (game.mode && game.mode.forceReturner);

  const shouldReturn = guaranteedReturn || Math.random() < 0.35;

  if (!shouldReturn) {
    roundsWithoutReturn++;
    return null;
  }

  roundsWithoutReturn = 0;

  const chosen = randomItem(available);
  chosen.returns = (chosen.returns || 0) + 1;

  return {
    name: chosen.name,
    color: chosen.color,
    faceColor: chosen.faceColor,
    losses: chosen.losses || 1,
    returns: chosen.returns,
    streak: 0,
    isReturning: true
  };
}

class Monkey {
  constructor({ name, color, faceColor, x, direction, isChampion = false, fighterType = null, streak = 0, isReturning = false, returns = 0, losses = 0 }) {
    this.name = name;
    this.color = color;
    this.faceColor = faceColor;
    this.x = x;
    this.y = groundY - 100;
    this.direction = direction;
    this.velocityX = 0;
    this.velocityY = 0;
    this.maxHealth = game.mode && game.mode.startingHealth
      ? game.mode.startingHealth
      : 100;
    this.health = this.maxHealth;
    this.state = "idle";
    this.stateTimer = 0;
    this.attackCooldown = 0;
    this.hitFlash = 0;
    this.walkCycle = 0;
    this.isGrounded = true;
    this.isBlocking = false;
    this.combo = 0;
    this.comboTimer = 0;
    this.target = null;
    this.isChampion = isChampion;
    this.fighterType = fighterTypes[0];
    this.streak = streak;
    this.isReturning = isReturning;
    this.returns = returns;
    this.losses = losses;
    this.aiDelay = Math.random() * 25;
  }

  update(dt) {
    this.attackCooldown -= dt;
    this.stateTimer -= dt;
    this.hitFlash -= dt;
    this.comboTimer -= dt;
    this.aiDelay -= dt;

    if (this.comboTimer <= 0) this.combo = 0;

    if (game.state === "fighting" && game.mode && game.mode.regeneration) {
      this.health = Math.min(this.maxHealth, this.health + game.mode.regeneration * dt);
    }

    this.velocityY += 0.5 * currentModeValue("gravity", 1) * dt;
    this.x += this.velocityX * dt;
    this.y += this.velocityY * dt;
    this.velocityX *= Math.pow(0.88, dt);

    const floor = groundY - 100;
    if (this.y >= floor) {
      this.y = floor;
      this.velocityY = 0;
      this.isGrounded = true;
    } else {
      this.isGrounded = false;
    }

    this.x = Math.max(70, Math.min(width - 70, this.x));

    if (this.target) this.direction = this.target.x > this.x ? 1 : -1;
    if (this.state === "walking") this.walkCycle += 0.25 * dt;

    if (this.stateTimer <= 0 && ["punch","kick","hurt","block","dodge"].includes(this.state)) {
      this.state = "idle";
      this.isBlocking = false;
    }

    if (game.state === "fighting") this.runAI(dt);
  }

  runAI(dt) {
    if (!this.target || this.health <= 0 || this.aiDelay > 0) return;
    if (["punch","kick","hurt","dodge","knockedOut"].includes(this.state)) return;

    const distance = Math.abs(this.target.x - this.x);
    const targetAttacking = ["punch","kick"].includes(this.target.state);

    if (
      targetAttacking &&
      distance < 145 &&
      Math.random() <
        0.025 *
        currentModeValue("dodgeChance", 1) *
        currentModeValue("defenseReaction", 1) *
        dt
    ) {
      if (game.mode && game.mode.noDodging) {
        if (!(game.mode && game.mode.noBlocking)) this.block();
      } else if (game.mode && game.mode.noBlocking) {
        this.dodge();
      } else {
        Math.random() < 0.55 ? this.block() : this.dodge();
      }
      return;
    }

    if (distance > 120) {
      this.state = "walking";
      this.velocityX += this.direction * (distance > 300 ? 2.3 : 1.5) * dt;
      if (distance > 220 && this.isGrounded && Math.random() < 0.0025 * currentModeValue("jumpChance", 1) * dt) this.jump();
      return;
    }

    this.state = "idle";
    if (distance < 78) this.velocityX -= this.direction * 0.7 * dt;

    if (this.attackCooldown <= 0) {
      Math.random() < 0.5 ? this.punch() : this.kick();
    }
  }

  jump() {
    if (!this.isGrounded || (game.mode && game.mode.noJumping)) return;
    this.velocityY = -9 * currentModeValue("jump", 1);
    this.velocityX += this.direction * 2;
  }

  punch() {
    if (this.attackCooldown > 0 || this.health <= 0) return;
    this.state = "punch";
    this.stateTimer = 24;
    this.attackCooldown = 42 * currentModeValue("cooldown", 1);
    setTimeout(() => {
      if (game.state === "fighting" && this.state === "punch") this.tryHit(11, 125, "PUNCH!");
    }, 170);
  }

  kick() {
    if (this.attackCooldown > 0 || this.health <= 0) return;
    this.state = "kick";
    this.stateTimer = 32;
    this.attackCooldown = 55 * currentModeValue("cooldown", 1);
    setTimeout(() => {
      if (game.state === "fighting" && this.state === "kick") this.tryHit(16, 145, "KICK!");
    }, 240);
  }

  block() {
    if (game.mode && game.mode.noBlocking) {
      this.dodge();
      return;
    }
    this.state = "block";
    this.stateTimer = 28;
    this.isBlocking = true;
    this.attackCooldown = 25;
  }

  dodge() {
    this.state = "dodge";
    this.stateTimer = 25;
    this.velocityX = -this.direction * 7;
    this.attackCooldown = 25;
    createFloatingText(this.x, this.y - 80, "DODGE!", "#fff");
  }

  tryHit(damage, range, text) {
    if (!this.target || this.target.health <= 0) return;
    const distance = Math.abs(this.target.x - this.x);
    const facing = Math.sign(this.target.x - this.x) === this.direction;
    if (distance > range || !facing) return;

    if (this.target.state === "dodge") {
      createFloatingText(this.target.x, this.target.y - 80, "MISSED!", "#fff");
      return;
    }

    let finalDamage = Math.round(damage * currentModeValue("damage", 1));
    if (this.target.isBlocking) {
      finalDamage = Math.max(1, Math.floor(finalDamage * currentModeValue("blockMultiplier", 0.25)));
      createFloatingText(this.target.x, this.target.y - 100, "BLOCK!", "#66ccff");
    } else {
      this.combo++;
      this.comboTimer = 100;
    }

    this.target.takeDamage(finalDamage, this.direction);
    createHitParticles(this.target.x, this.target.y - 45, this.color);

    if (this.target.isBlocking) {
      playBlockSound();
    } else if (text === "KICK!") {
      playKickSound();
    } else if (text !== "PUNCH!") {
      playKickSound();
      setTimeout(() => playTone(220, 0.18, "sawtooth", 0.08, 70), 40);
    } else {
      playPunchSound();
    }

    createFloatingText(this.target.x, this.target.y - 120, text, "#ffe600");

    if (this.combo >= 2) {
      createFloatingText(this.x, this.y - 145, this.combo + " HIT COMBO!", "#ff9900");
    }
    game.screenShake = this.target.isBlocking ? 3 : 8;
  }

  takeDamage(amount, direction) {
    if (this.health <= 0) return;
    this.health = Math.max(0, this.health - amount);
    this.hitFlash = 8;
    this.velocityX =
      direction *
      amount *
      0.22 *
      currentModeValue("knockback", 1);

    if (!this.isBlocking) {
      this.state = "hurt";
      this.stateTimer = 18;
    }

    if (this.health <= 0) {
      this.state = "knockedOut";
      this.velocityX = direction * 6;
      this.velocityY = -5;
      setTimeout(() => endFight(this.target), 900);
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);

    if (this.state === "knockedOut") ctx.rotate(this.direction * 1.3);
    ctx.scale(this.direction, 1);

    const bounce = this.state === "walking"
      ? Math.sin(this.walkCycle) * 3
      : Math.sin(game.time * 0.08) * 1.5;

    ctx.translate(0, bounce);

    if (this.hitFlash > 0 && Math.floor(this.hitFlash) % 2 === 0) ctx.globalAlpha = 0.45;

    this.drawShadow();
    this.drawTail();
    this.drawBody();
    this.drawLegs();
    this.drawArms();
    this.drawHead();
    if (this.isChampion) this.drawCrown();

    ctx.restore();
  }

  drawShadow() {
    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.ellipse(0, 103, 48, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  drawTail() {
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 11;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(-27, 48);
    ctx.bezierCurveTo(-70, 35, -75, -20, -40, -22);
    ctx.stroke();
  }

  drawBody() {
    ctx.fillStyle = this.color;
    ctx.strokeStyle = "#2d1b10";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.ellipse(0, 43, 35, 48, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = this.faceColor;
    ctx.beginPath();
    ctx.ellipse(5, 50, 20, 27, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  drawHead() {
    ctx.fillStyle = this.color;
    ctx.strokeStyle = "#2d1b10";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(0, -23, 36, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    for (const ex of [-30, 30]) {
      ctx.beginPath();
      ctx.arc(ex, -28, 14, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }

    ctx.fillStyle = this.faceColor;
    ctx.beginPath();
    ctx.ellipse(7, -16, 24, 21, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.arc(-4, -31, 3, 0, Math.PI * 2);
    ctx.arc(15, -31, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#3d2010";
    ctx.lineWidth = 3;
    ctx.beginPath();
    if (this.state === "hurt") ctx.arc(7, -8, 8, Math.PI, Math.PI * 2);
    else ctx.arc(7, -12, 8, 0, Math.PI);
    ctx.stroke();
  }

  drawArms() {
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 15;
    ctx.lineCap = "round";

    let fx = 42, fy = 40, bx = -38, by = 46;

    if (this.state === "punch") {
      const p = Math.max(0, 1 - Math.abs(this.stateTimer - 13) / 13);
      fx = 42 + p * 65;
      fy = 28;
    }
    if (this.state === "block") {
      fx = 32; fy = -18; bx = 8; by = -25;
    }
    if (this.state === "hurt") {
      fx = 24; fy = 65; bx = -25; by = 68;
    }

    ctx.beginPath();
    ctx.moveTo(24, 23);
    ctx.lineTo(fx, fy);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(-24, 23);
    ctx.lineTo(bx, by);
    ctx.stroke();

    ctx.fillStyle = this.faceColor;
    for (const [x, y] of [[fx,fy],[bx,by]]) {
      ctx.beginPath();
      ctx.arc(x, y, 10, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  drawLegs() {
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 16;
    ctx.lineCap = "round";

    let lx = -18, ly = 100, rx = 20, ry = 100;

    if (this.state === "walking") {
      lx += Math.sin(this.walkCycle) * 14;
      rx -= Math.sin(this.walkCycle) * 14;
    }

    if (this.state === "kick") {
      const p = Math.max(0, 1 - Math.abs(this.stateTimer - 15) / 15);
      rx = 22 + p * 70;
      ry = 70 - p * 15;
    }

    ctx.beginPath();
    ctx.moveTo(-16, 76);
    ctx.lineTo(lx, ly);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(16, 76);
    ctx.lineTo(rx, ry);
    ctx.stroke();

    ctx.fillStyle = this.faceColor;
    ctx.beginPath();
    ctx.ellipse(lx + 5, ly, 16, 8, 0, 0, Math.PI * 2);
    ctx.ellipse(rx + 5, ry, 16, 8, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  drawCrown() {
    ctx.save();
    ctx.translate(0, -68);
    ctx.scale(this.direction, 1);
    ctx.fillStyle = "#ffd700";
    ctx.strokeStyle = "#7a4b00";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-24, 12);
    ctx.lineTo(-19, -12);
    ctx.lineTo(-7, 2);
    ctx.lineTo(0, -18);
    ctx.lineTo(9, 2);
    ctx.lineTo(21, -12);
    ctx.lineTo(25, 12);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }
}

function makeMonkey(data, x, direction, isChampion = false) {
  return new Monkey({
    name: data.name,
    color: data.color,
    faceColor: data.faceColor,
    x,
    direction,
    isChampion,
    streak: data.streak || 0,
    isReturning: data.isReturning || false,
    returns: data.returns || 0,
    losses: data.losses || 0
  });
}

function createFirstFight() {
  const style1 = randomItem(styles);
  let style2 = randomItem(styles);
  while (style2 === style1) style2 = randomItem(styles);

  const data1 = { name: randomName(), streak: 0, ...style1 };
  const data2 = { name: randomName([data1.name]), streak: 0, ...style2 };

  monkey1 = makeMonkey(data1, width * (0.5 - currentModeValue("startSpacing", 0.5) / 2), 1);
  monkey2 = makeMonkey(data2, width * (0.5 + currentModeValue("startSpacing", 0.5) / 2), -1);
  monkey1.target = monkey2;
  monkey2.target = monkey1;
}

function createNextFight() {
  const championLeft = Math.random() < 0.5;
  const challengerStyle = randomItem(styles);

  let challenger = getReturningChallenger([championData.name]);

  if (!challenger) {
    challenger = {
      name: randomName([championData.name]),
      streak: 0,
      isReturning: false,
      returns: 0,
      losses: 0,
      ...challengerStyle
    };
  }

  if (championLeft) {
    monkey1 = makeMonkey(championData, width * (0.5 - currentModeValue("startSpacing", 0.5) / 2), 1, true);
    monkey2 = makeMonkey(challenger, width * (0.5 + currentModeValue("startSpacing", 0.5) / 2), -1);
  } else {
    monkey1 = makeMonkey(challenger, width * (0.5 - currentModeValue("startSpacing", 0.5) / 2), 1);
    monkey2 = makeMonkey(championData, width * (0.5 + currentModeValue("startSpacing", 0.5) / 2), -1, true);
  }

  monkey1.target = monkey2;
  monkey2.target = monkey1;
}

function drawBackground() {
  const theme = game.arena;
  const grad = ctx.createLinearGradient(0, 0, 0, groundY);
  grad.addColorStop(0, theme.sky1);
  grad.addColorStop(1, theme.sky2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, width, height);

  ctx.fillStyle = theme.sun;
  ctx.beginPath();
  ctx.arc(width * 0.86, height * 0.16, 48, 0, Math.PI * 2);
  ctx.fill();

  drawCloud(width * 0.18, height * 0.17, 1);
  drawCloud(width * 0.72, height * 0.12, 0.8);
  drawMountain(width * 0.15, groundY, 260, 210);
  drawMountain(width * 0.72, groundY, 310, 250);

  ctx.fillStyle = theme.grass;
  ctx.fillRect(0, groundY - 40, width, 40);
  ctx.fillStyle = theme.ground;
  ctx.fillRect(0, groundY, width, height - groundY);

  drawTree(80, groundY);
  drawTree(width - 90, groundY);
}

function drawCloud(x, y, s) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);
  ctx.fillStyle = "rgba(255,255,255,.85)";
  ctx.beginPath();
  ctx.arc(-35, 10, 28, 0, Math.PI * 2);
  ctx.arc(0, -5, 38, 0, Math.PI * 2);
  ctx.arc(42, 10, 27, 0, Math.PI * 2);
  ctx.fillRect(-35, 10, 77, 27);
  ctx.fill();
  ctx.restore();
}

function drawMountain(x, y, w, h) {
  ctx.fillStyle = "#6b9669";
  ctx.beginPath();
  ctx.moveTo(x - w/2, y);
  ctx.lineTo(x, y - h);
  ctx.lineTo(x + w/2, y);
  ctx.closePath();
  ctx.fill();
}

function drawTree(x, y) {
  ctx.fillStyle = "#68421f";
  ctx.fillRect(x - 18, y - 150, 36, 150);

  ctx.fillStyle = "#2f8a3b";

  ctx.beginPath();
  ctx.arc(x, y - 160, 65, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x - 35, y - 135, 48, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x + 42, y - 135, 50, 0, Math.PI * 2);
  ctx.fill();
}

function roundRect(ctx, x, y, w, h, r) {
  const radius = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.arcTo(x + w, y, x + w, y + h, radius);
  ctx.arcTo(x + w, y + h, x, y + h, radius);
  ctx.arcTo(x, y + h, x, y, radius);
  ctx.arcTo(x, y, x + w, y, radius);
  ctx.closePath();
}

function drawHealthBars() {
  const barWidth = Math.min(350, width * 0.33);
  drawHealthBar(40, 35, barWidth, 30, monkey1, false);
  drawHealthBar(width - barWidth - 40, 35, barWidth, 30, monkey2, true);

  ctx.save();

  ctx.fillStyle = "#fff";
  ctx.strokeStyle = "#111";
  ctx.lineWidth = 7;
  ctx.font = "bold 25px Arial";
  ctx.textAlign = "center";
  ctx.strokeText("ROUND " + game.round, width / 2, 46);
  ctx.fillText("ROUND " + game.round, width / 2, 46);

  ctx.font = "bold 15px Arial";
  ctx.lineWidth = 5;
  ctx.strokeText(game.arena.name, width / 2, 69);
  ctx.fillText(game.arena.name, width / 2, 69);

  if (game.mode) {
    ctx.font = "bold 16px Arial";
    ctx.lineWidth = 5;
    ctx.fillStyle = "#fff36b";
    ctx.strokeStyle = "#111";
    const modeLabel = game.mode.icon + " " + game.mode.name + " " + game.mode.icon;
    ctx.strokeText(modeLabel, width / 2, 92);
    ctx.fillText(modeLabel, width / 2, 92);
  }

  ctx.restore();
}

function drawHealthBar(x, y, w, h, monkey, reverse) {
  ctx.fillStyle = "#222";
  ctx.fillRect(x - 5, y - 5, w + 10, h + 10);
  ctx.fillStyle = "#5a1717";
  ctx.fillRect(x, y, w, h);

  const percent = monkey.health / monkey.maxHealth;
  const healthWidth = w * percent;
  ctx.fillStyle = percent < .25 ? "#ef3838" : percent < .5 ? "#ffc52e" : "#46d34f";
  ctx.fillRect(reverse ? x + w - healthWidth : x, y, healthWidth, h);

  const alignX = reverse ? x + w : x;
  const crown = monkey.isChampion ? " 👑" : "";
  const streakText = monkey.streak > 0 ? " • " + monkey.streak + " wins" : "";
  const topText = monkey.name + crown + "  " + Math.ceil(monkey.health);
  const bottomText = monkey.isChampion
    ? ("Champion" + streakText)
    : (monkey.isReturning
        ? "Returning Challenger • comeback " + monkey.returns
        : "Challenger");

  ctx.textAlign = reverse ? "right" : "left";

  ctx.font = "bold 17px Arial";
  const topWidth = ctx.measureText(topText).width;
  const topBoxX = reverse ? alignX - topWidth - 8 : alignX - 8;
  ctx.fillStyle = "rgba(0,0,0,0.72)";
  roundRect(ctx, topBoxX, y - 32, topWidth + 16, 24, 7);
  ctx.fill();

  ctx.strokeStyle = "#000";
  ctx.lineWidth = 4;
  ctx.fillStyle = "#fff";
  ctx.strokeText(topText, alignX, y - 13);
  ctx.fillText(topText, alignX, y - 13);

  ctx.font = "bold 13px Arial";
  const bottomWidth = ctx.measureText(bottomText).width;
  const bottomBoxX = reverse ? alignX - bottomWidth - 8 : alignX - 8;
  ctx.fillStyle = "rgba(0,0,0,0.68)";
  roundRect(ctx, bottomBoxX, y + h + 5, bottomWidth + 16, 21, 6);
  ctx.fill();

  ctx.strokeStyle = "#000";
  ctx.lineWidth = 3;
  ctx.fillStyle = "#fff";
  ctx.strokeText(bottomText, alignX, y + h + 20);
  ctx.fillText(bottomText, alignX, y + h + 20);
}

function createHitParticles(x, y, color) {
  for (let i = 0; i < 18; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - .5) * 10,
      vy: (Math.random() - .5) * 10,
      life: 35 + Math.random() * 20,
      size: 3 + Math.random() * 7,
      color: Math.random() < .5 ? color : "#ffe600"
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += .15 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life / 40);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function createFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 50 });
}

function updateFloatingTexts(dt) {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].y -= .7 * dt;
    floatingTexts[i].life -= dt;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }
}

function drawFloatingTexts() {
  for (const t of floatingTexts) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, t.life / 20);
    ctx.font = "bold 25px Arial";
    ctx.textAlign = "center";
    ctx.lineWidth = 7;
    ctx.strokeStyle = "rgba(0,0,0,0.9)";
    ctx.fillStyle = t.color;
    ctx.shadowColor = "rgba(0,0,0,0.65)";
    ctx.shadowBlur = 6;
    ctx.strokeText(t.text, t.x, t.y);
    ctx.fillText(t.text, t.x, t.y);
    ctx.restore();
  }
}

function updateCountdown(dt) {
  if (game.state !== "countdown") return;
  game.countdownTimer += dt;
  if (game.countdownTimer >= 60) {
    game.countdownTimer = 0;
    game.countdown--;
    playCountdownSound();
    if (game.countdown <= 0) game.state = "fighting";
  }
}

function drawCountdown() {
  if (game.state !== "countdown") return;
  ctx.save();
  ctx.font = "bold 100px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.lineWidth = 10;
  ctx.strokeStyle = "#222";
  ctx.fillStyle = "#ffe12d";
  ctx.strokeText(game.countdown, width / 2, height / 2);
  ctx.fillText(game.countdown, width / 2, height / 2);
  ctx.restore();
}

function endFight(winner) {
  if (game.state === "finished") return;
  game.state = "finished";
  game.winner = winner.name;
  playWinnerSound();
  winner.state = "victory";
  winner.isChampion = true;

  winner.streak = (winner.streak || 0) + 1;
  championData = {
    name: winner.name,
    color: winner.color,
    faceColor: winner.faceColor,
    streak: winner.streak
  };

  restartButton.style.display = "block";
  createFloatingText(winner.x, winner.y - 150, "CHAMPION!", "#ffe600");

  setTimeout(() => {
    createFloatingText(
      width / 2,
      height * 0.62,
      randomItem([
        "WHAT A FIGHT!","TOTAL DOMINATION!","A JUNGLE CLASSIC!",
        "THE CROWD ERUPTS!","ANOTHER WIN FOR THE CHAMPION!",
        "THAT WAS CLOSE!","A NEW LEGEND RISES!","BANANAS EVERYWHERE!",
        "THE CHAMPION SURVIVES!","WHAT A COMEBACK!","ABSOLUTE MAYHEM!",
        "THE CANOPY WILL REMEMBER THIS!"
      ]),
      "#ffffff"
    );
  }, 350);
}

function drawWinnerScreen() {
  if (game.state !== "finished") return;
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,.55)";
  ctx.fillRect(0, 0, width, height);

  ctx.textAlign = "center";
  ctx.font = "bold 72px Arial";
  ctx.lineWidth = 9;
  ctx.strokeStyle = "#111";
  ctx.fillStyle = "#ffe600";
  ctx.strokeText("WINNER!", width / 2, height * .35);
  ctx.fillText("WINNER!", width / 2, height * .35);

  ctx.font = "bold 48px Arial";
  ctx.fillStyle = "#fff";
  ctx.strokeText(game.winner, width / 2, height * .47);
  ctx.fillText(game.winner, width / 2, height * .47);

  ctx.font = "bold 24px Arial";
  ctx.fillText(winnerSummary(), width / 2, height * .55);
  ctx.restore();
}

function winnerSummary() {
  const winner = monkey1.name === game.winner ? monkey1 : monkey2;
  return winner.streak + " win streak";
}

function currentModeValue(key, fallback = 1) {
  if (!game.mode || game.mode[key] === undefined) return fallback;
  return game.mode[key];
}

function chooseFightMode() {
  // No special modes in the first two rounds.
  if (game.round < 3) {
    game.mode = null;
    return;
  }

  const overdue = game.round - game.lastModeRound >= 4;
  const shouldHaveMode = overdue || Math.random() < 0.48;

  if (!shouldHaveMode) {
    game.mode = null;
    return;
  }

  let choices = fightModes.filter(mode => mode.name !== game.lastModeName);
  game.mode = randomItem(choices);
  game.lastModeRound = game.round;
  game.lastModeName = game.mode.name;
}

function nextFight() {
  particles.length = 0;
  floatingTexts.length = 0;
  game.state = "countdown";
  game.countdown = 3;
  game.countdownTimer = 0;
  game.winner = "";
  game.screenShake = 0;
  game.round++;
  game.arena = randomItem(arenaThemes);
  chooseFightMode();

  createNextFight();
  setTimeout(() => {
    if (game.state === "countdown") {
      const challenger = monkey1.isChampion ? monkey2 : monkey1;

      if (game.mode) {
        playTone(660, 0.09, "square", 0.06, 990);
        setTimeout(() => playTone(880, 0.12, "square", 0.06, 1320), 100);

        createFloatingText(
          width / 2,
          height * 0.24,
          game.mode.icon + " " + game.mode.name + " " + game.mode.icon,
          "#fff36b"
        );

        setTimeout(() => {
          createFloatingText(
            width / 2,
            height * 0.31,
            game.mode.description,
            "#ffffff"
          );
        }, 350);

        if (challenger.isReturning) {
          setTimeout(() => {
            createFloatingText(
              width / 2,
              height * 0.37,
              challenger.name + " RETURNS!",
              "#87f7ff"
            );
          }, 720);
        }
      } else {
        const introText = challenger.isReturning
          ? challenger.name + " RETURNS!"
          : randomItem([
              "A NEW CHALLENGER!","TITLE DEFENSE!","JUNGLE SHOWDOWN!",
              "MONKEY MAYHEM!","CHAMPIONSHIP FIGHT!","RUMBLE IN THE CANOPY!",
              "BANANA BATTLE!","CANOPY CLASH!","JUNGLE RUMBLE!",
              "PRIMATE SHOWDOWN!","THE CROWD GOES WILD!","WHO WILL WIN?",
              "IT'S MONKEY TIME!","LET THE BONKING BEGIN!","ANOTHER JUNGLE CLASSIC!",
              "THE CHAMPION IS READY!","THE CHALLENGER LOOKS CONFIDENT!",
              "BANANAS ARE ON THE LINE!","THE CROWD WANTS CHAOS!",
              "A LEGEND COULD BE BORN!","NO TURNING BACK NOW!",
              "THE CANOPY IS SHAKING!","THIS ONE COULD BE WILD!",
              "A RIVALRY BEGINS!","WHO RULES THE JUNGLE?",
              "THE TITLE IS ON THE LINE!","MONKEY BUSINESS STARTS NOW!"
            ]);

        createFloatingText(width / 2, height * 0.28, introText, "#ffffff");
      }
    }
  }, 150);
  restartButton.style.display = "none";
}

restartButton.addEventListener("click", nextFight);

createFirstFight();

function loop(now) {
  const dt = Math.min(2, (now - previousTime) / 16.67);
  previousTime = now;
  game.time += dt;

  const gameSpeed = currentModeValue("speed", 1);
  const activeDt = dt * gameSpeed;

  updateCountdown(activeDt);
  monkey1.update(activeDt);
  monkey2.update(activeDt);
  updateParticles(activeDt);
  updateFloatingTexts(activeDt);

  let sx = 0, sy = 0;
  if (game.screenShake > 0) {
    sx = (Math.random() - .5) * game.screenShake;
    sy = (Math.random() - .5) * game.screenShake;
    game.screenShake *= .84;
  }

  ctx.save();
  ctx.translate(sx, sy);
  drawBackground();
  monkey1.draw();
  monkey2.draw();
  drawParticles();
  drawFloatingTexts();
  ctx.restore();

  drawHealthBars();
  drawCountdown();
  drawWinnerScreen();

  requestAnimationFrame(loop);
}


const bracketButton=document.getElementById("bracketButton");
const bracketPanel=document.getElementById("bracketPanel");
const bracketList=document.getElementById("bracketList");
const closeBracketButton=document.getElementById("closeBracketButton");

bracketButton.onclick=()=>{
 bracketPanel.style.display=bracketPanel.style.display==="block"?"none":"block";
};
closeBracketButton.onclick=()=>{
 bracketPanel.style.display="none";
};

const oldEndFight=endFight;
endFight=function(winner){
 const loser = winner===monkey1 ? monkey2 : monkey1;

 // This was missing before, which meant the defeated pool stayed empty.
 rememberDefeatedMonkey(loser);

 oldEndFight(winner);

 bracketHistory.push(
   "Round "+game.round+(game.mode ? " ["+game.mode.name+"]" : "")+": "+winner.name+" defeated "+loser.name+
   (loser.isReturning ? " in a comeback fight" : "")+
   " with "+Math.ceil(winner.health)+" HP left — streak: "+winner.streak
 );
 bracketList.innerHTML=bracketHistory.map((x,i)=>"<div><b>"+(i+1)+".</b> "+x+"</div>").join("<hr>");
 bracketButton.style.display="block";
};
requestAnimationFrame(loop);
</script>
